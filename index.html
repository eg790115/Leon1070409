<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>洋洋作息打勾表</title>
    
    <!-- PWA 配置 -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"洋洋作息打勾表","short_name":"洋洋作息","start_url":"index.html","display":"standalone","background_color":"#f1f5f9","theme_color":"#f97316","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/1426/1426735.png","sizes":"512x512","type":"image/png"}]}'>
    
    <!-- iOS 專用標籤 (手動加入主畫面後仍可全螢幕) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="洋洋作息">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1426/1426735.png">
    <meta name="theme-color" content="#f97316">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #f1f5f9;
            user-select: none; -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }
        #root { height: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes bounce-fast {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15%) scale(1.05); }
        }
        .animate-bounce-fast { animation: bounce-fast 0.6s infinite ease-in-out; }
        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .animate-confetti-fall { animation: confetti-fall linear infinite; }
        .app-container { height: 100vh; display: flex; flex-direction: column; }
        .scrollable-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .trophy-glow { filter: drop-shadow(0 0 15px rgba(250, 204, 21, 0.8)); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 手動定義 SVG 圖示組件 (移除下載圖示) ---
        const Icon = ({ name, className = "w-6 h-6", style = {}, strokeWidth = 2.5 }) => {
            const icons = {
                Calendar: <path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />,
                Trophy: <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55.47.98.97 1.21C12.23 18.8 13.77 18.8 15.03 18.21c.5-.23.97-.66.97-1.21v-2.34M12 6v8M12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6z" />,
                Crown: <path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7z" />,
                CheckCircle2: <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM9 12l2 2 4-4" />,
                Plus: <path d="M12 5v14M5 12h14" />,
                Trash2: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" />,
                Settings2: <path d="M20 7h-9M14 17H5M17 12H7M7 2h0M7 22h0M17 2h0M17 22h0M7 7a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM17 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM7 17a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" />,
                User: <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" />,
                ShieldCheck: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10zM9 12l2 2 4-4" />,
                X: <path d="M18 6 6 18M6 6l12 12" />,
                Heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                Star: <path d="m12 2 3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />,
                Sparkles: <path d="m12 3 1.91 5.82L20 10.73l-5.12 3.91L16.79 21 12 17.27 7.21 21l1.91-6.36L4 10.73l6.09-1.91L12 3z" />,
                GripVertical: <g><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></g>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={style}>{icons[name]}</svg>
            );
        };

        // --- 存儲配置 ---
        const DB_NAME = 'YangYangRoyal_V49_Clean';
        const STORE_NAME = 'ChecklistData';
        const STORAGE_KEYS = {
            TASKS: 'yang_v49_tasks',
            TASKS_BAK: 'yang_v49_tasks_bak',
            PROGRESS: (day) => `yang_v49_checked_${day}`,
            PROGRESS_BAK: (day) => `yang_v49_checked_${day}_bak`
        };

        const openDB = () => {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
                request.onsuccess = () => resolve(request.result);
            });
        };

        const idbSave = async (key, data) => {
            try {
                const db = await openDB();
                db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).put(data, key);
            } catch (e) { }
        };

        const idbLoad = async (key) => {
            try {
                const db = await openDB();
                return new Promise((resolve) => {
                    const request = db.transaction(STORE_NAME, 'readonly').objectStore(STORE_NAME).get(key);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => resolve(null);
                });
            } catch (e) { return null; }
        };

        const robustSave = (key, backupKey, data) => {
            const json = JSON.stringify(data);
            try {
                localStorage.setItem(key, json);
                localStorage.setItem(backupKey, json);
                idbSave(key, data); 
            } catch (e) { }
        };

        const robustLoad = async (key, backupKey, defaultValue) => {
            const idbData = await idbLoad(key);
            if (idbData) return idbData;
            const primary = localStorage.getItem(key);
            if (primary) { try { return JSON.parse(primary); } catch (e) { } }
            const backup = localStorage.getItem(backupKey);
            if (backup) { try { return JSON.parse(backup); } catch (e) { } }
            return defaultValue;
        };

        const baseDays = [
            { id: 1, label: '一' }, { id: 2, label: '二' }, { id: 3, label: '三' },
            { id: 4, label: '四' }, { id: 5, label: '五' }, { id: 6, label: '六' }, { id: 7, label: '日' },
        ];

        const RoyalRays = () => {
            const angles = [0, 72, 144, 216, 288];
            return (
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[200vmin] h-[200vmin] pointer-events-none z-[-1]"
                     style={{ maskImage: 'radial-gradient(circle, transparent 3.5%, black 12%)', WebkitMaskImage: 'radial-gradient(circle, transparent 3.5%, black 12%)' }}>
                    <div className="absolute inset-0 animate-[spin_12s_linear_infinite] flex items-center justify-center">
                        {angles.map(a => (
                            <div key={`g1-${a}`} className="absolute h-full" style={{ transform: `rotate(${a}deg)`, width: '80px', background: `linear-gradient(to top, #FFD700, transparent 50%, #FFD700)`, clipPath: 'polygon(49.5% 50%, 50.5% 50%, 100% 0, 0 0, 49.5% 50%, 50.5% 50%, 100% 100%, 0 100%)', opacity: 0.6 }} />
                        ))}
                    </div>
                    <div className="absolute inset-0 animate-[spin_24s_linear_infinite_reverse] flex items-center justify-center">
                        {angles.map(a => (
                            <div key={`g2-${a}`} className="absolute h-full" style={{ transform: `rotate(${a + 36}deg)`, width: '100px', background: `linear-gradient(to top, #FFFDF0, transparent 50%, #FFFDF0)`, clipPath: 'polygon(49.5% 50%, 50.5% 50%, 100% 0, 0 0, 49.5% 50%, 50.5% 50%, 100% 100%, 0 100%)', opacity: 0.5 }} />
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [mode, setMode] = useState('kid'); 
            const [realToday] = useState(new Date());
            const realDayOfWeek = useMemo(() => realToday.getDay() || 7, [realToday]);
            const formattedDate = useMemo(() => `${realToday.getFullYear()}年${realToday.getMonth() + 1}月${realToday.getDate()}日`, [realToday]);

            const daysWithDates = useMemo(() => {
                const monday = new Date(realToday);
                monday.setDate(realToday.getDate() - (realDayOfWeek - 1));
                return baseDays.map((day, index) => {
                    const d = new Date(monday);
                    d.setDate(monday.getDate() + index);
                    return { ...day, dateStr: `${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}` };
                });
            }, [realToday, realDayOfWeek]);

            const [selectedDay, setSelectedDay] = useState(realDayOfWeek); 
            const [checkedItems, setCheckedItems] = useState({});
            const [allTasks, setAllTasks] = useState([]);
            const [isManageOpen, setIsManageOpen] = useState(false);
            const [mgmtViewMode, setMgmtViewMode] = useState('list');
            const [deleteConfirmId, setDeleteConfirmId] = useState(null);
            const [editingTask, setEditingTask] = useState(null);
            const [showCelebration, setShowCelebration] = useState(false);

            useEffect(() => {
                const initData = async () => {
                    const tasks = await robustLoad(STORAGE_KEYS.TASKS, STORAGE_KEYS.TASKS_BAK, [
                        { id: '1', cat: '每天', title: '聽英文', rule: [1, 3, 4, 6] },
                        { id: '2', cat: '每天', title: '背誦單字', rule: [1, 3, 4, 6] },
                        { id: '3', cat: '每天', title: '跳繩 300 下', rule: [1, 3, 4, 6] }
                    ]);
                    setAllTasks(tasks);
                    const checked = await robustLoad(STORAGE_KEYS.PROGRESS(selectedDay), STORAGE_KEYS.PROGRESS_BAK(selectedDay), {});
                    setCheckedItems(checked);
                };
                initData();
            }, [selectedDay]);

            const currentTasks = useMemo(() => allTasks.filter(t => t.rule.includes(selectedDay)), [selectedDay, allTasks]);
            const completedCount = currentTasks.filter(t => checkedItems[t.id]).length;
            const progress = currentTasks.length ? Math.round((completedCount / currentTasks.length) * 100) : 0;

            useEffect(() => {
                if (progress === 100 && currentTasks.length > 0 && mode === 'kid') setShowCelebration(true);
                else setShowCelebration(false);
            }, [progress, mode, currentTasks.length]);

            const toggleItem = (id) => {
                if (mode === 'kid' && selectedDay !== (realToday.getDay() || 7)) return;
                const updatedChecked = { ...checkedItems, [id]: !checkedItems[id] };
                setCheckedItems(updatedChecked);
                robustSave(STORAGE_KEYS.PROGRESS(selectedDay), STORAGE_KEYS.PROGRESS_BAK(selectedDay), updatedChecked);
            };

            const addTask = () => {
                const newTask = { id: Date.now().toString(), cat: '日常', title: '新項目', rule: [1, 3, 4] };
                const updated = [newTask, ...allTasks];
                setAllTasks(updated);
                robustSave(STORAGE_KEYS.TASKS, STORAGE_KEYS.TASKS_BAK, updated);
            };

            const confirmRemoveTask = (id) => {
                const updated = allTasks.filter(t => t.id !== id);
                setAllTasks(updated);
                robustSave(STORAGE_KEYS.TASKS, STORAGE_KEYS.TASKS_BAK, updated);
                setDeleteConfirmId(null);
            };

            const updateTask = (id, field, value) => {
                const updated = allTasks.map(t => t.id === id ? { ...t, [field]: value } : t);
                setAllTasks(updated);
                robustSave(STORAGE_KEYS.TASKS, STORAGE_KEYS.TASKS_BAK, updated);
            };

            const toggleTaskRule = (taskId, dayId) => {
                const updated = allTasks.map(t => {
                    if (t.id === taskId) {
                        const newRule = t.rule.includes(dayId) ? t.rule.filter(d => d !== dayId) : [...t.rule, dayId].sort();
                        return { ...t, rule: newRule };
                    }
                    return t;
                });
                setAllTasks(updated);
                robustSave(STORAGE_KEYS.TASKS, STORAGE_KEYS.TASKS_BAK, updated);
            };

            const dynamicColor = useMemo(() => {
                if (currentTasks.length === 0 || completedCount === 0) return "#94a3b8"; 
                const ratio = completedCount / currentTasks.length;
                return `hsl(${Math.round(25 + (27 * ratio))}, ${Math.round(70 + (30 * ratio))}%, ${Math.round(45 + (12 * ratio))}%)`;
            }, [completedCount, currentTasks.length]);

            return (
                <div className="app-container">
                    
                    {/* 慶祝畫面 */}
                    {showCelebration && (
                        <div className="fixed inset-0 z-[250] flex flex-col items-center justify-center bg-black/80 backdrop-blur-md cursor-pointer animate-in fade-in duration-500 px-4 text-center"
                             onClick={() => setShowCelebration(false)}>
                            <div className="fixed inset-0 pointer-events-none overflow-hidden">
                                {[...Array(60)].map((_, i) => (
                                    <div key={i} className="absolute bg-yellow-400 rounded-sm animate-confetti-fall"
                                         style={{ left: `${Math.random() * 100}%`, width: `10px`, height: `6px`, animationDuration: `${Math.random() * 2 + 2}s`, animationDelay: `${Math.random() * 3}s`, opacity: Math.random() + 0.5, transform: `rotate(${Math.random() * 360}deg)` }}
                                    />
                                ))}
                            </div>
                            <div className="relative flex flex-col items-center justify-center w-full max-w-2xl transform scale-90 sm:scale-100">
                                <div className="relative flex items-center justify-center mb-10 w-44 md:w-64 h-44 md:h-64 overflow-visible">
                                    <RoyalRays />
                                    <div className="absolute inset-0 bg-yellow-400 blur-[80px] opacity-60 animate-pulse scale-125" />
                                    <Icon name="Crown" className="relative z-[160] w-2/3 h-2/3 text-yellow-400 drop-shadow-[0_0_60px_rgba(250,204,21,1)] animate-bounce" strokeWidth={1.5} />
                                </div>
                                <div className="relative z-[160] bg-gradient-to-r from-yellow-300 via-orange-500 to-yellow-300 p-1 rounded-[3.5rem] md:rounded-[4rem] shadow-2xl animate-in slide-in-from-bottom-12 duration-700 w-full max-w-lg">
                                    <div className="bg-white px-8 py-12 md:py-16 rounded-[3.8rem] flex flex-col items-center overflow-hidden text-center">
                                        <h2 className="text-4xl sm:text-5xl md:text-7xl font-black italic tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-yellow-500 via-orange-600 to-yellow-800 mb-4 whitespace-nowrap">任務達成!!</h2>
                                        <p className="text-slate-400 font-bold text-lg sm:text-xl md:text-2xl tracking-[0.3em] uppercase italic border-t border-slate-100 pt-8 w-full">Mission Accomplished</p>
                                        <div className="mt-14"><p className="font-black text-sm text-slate-700 uppercase tracking-[0.5em] animate-pulse bg-slate-50 px-6 py-2 rounded-full border border-slate-200">點擊螢幕關閉</p></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="main-content p-2 md:p-6 lg:p-10 relative overflow-hidden">
                        
                        {/* 頂部切換 (已刪除下載按鈕) */}
                        <div className="flex justify-center mb-4 flex-shrink-0">
                            <div className="bg-white/80 backdrop-blur-sm p-1 rounded-2xl shadow-sm border border-slate-200 flex gap-1 items-center">
                                <button onClick={() => setMode('kid')}
                                    className={`flex items-center gap-2 px-8 py-2.5 rounded-xl text-sm font-bold transition-all ${mode === 'kid' ? 'bg-orange-500 text-white shadow-md' : 'text-slate-400 hover:text-orange-300'}`}>
                                    <Icon name="User" className="w-4 h-4" /> 洋洋模式
                                </button>
                                <button onClick={() => setMode('parent')}
                                    className={`flex items-center gap-2 px-8 py-2.5 rounded-xl text-sm font-bold transition-all ${mode === 'parent' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-indigo-300'}`}>
                                    <Icon name="ShieldCheck" className="w-4 h-4" /> 皇室管理
                                </button>
                            </div>
                        </div>

                        <div className={`bg-white rounded-[3rem] md:rounded-[4.5rem] shadow-2xl overflow-hidden border-b-[16px] main-card transition-all duration-500 flex flex-col ${mode === 'kid' ? 'border-orange-400' : 'border-indigo-600'}`}>
                            
                            {/* Header */}
                            <div className={`px-8 py-8 md:px-14 md:py-12 text-white relative flex-shrink-0 transition-colors duration-1000 ${mode === 'kid' ? 'bg-gradient-to-br from-orange-400 via-rose-400 to-rose-500 shadow-inner' : 'bg-gradient-to-br from-indigo-600 to-blue-700'}`}>
                                <div className="flex justify-between items-start mb-6 text-center">
                                   <div className="bg-white/20 backdrop-blur-xl border border-white/30 px-8 py-4 rounded-[2.2rem] shadow-lg flex items-center gap-4 mx-auto md:mx-0">
                                      <Icon name="Calendar" className="w-10 h-10 opacity-70" />
                                      <h2 className="text-3xl sm:text-5xl md:text-7xl font-black tracking-tighter drop-shadow-md">
                                        {formattedDate}
                                      </h2>
                                   </div>
                                </div>
                                
                                <div className="flex flex-col md:flex-row items-center gap-10 md:gap-14 text-center md:text-left">
                                    <div className="flex-1 overflow-visible">
                                        <h1 className="text-5xl sm:text-7xl md:text-9xl font-black drop-shadow-md tracking-tighter leading-tight mb-8">洋洋，加油！</h1>
                                        <div className="flex flex-wrap justify-center md:justify-start">
                                            <p className="text-lg sm:text-2xl md:text-3xl font-bold bg-black/15 px-10 py-5 rounded-3xl inline-flex items-center gap-4 backdrop-blur-sm shadow-inner">
                                                {progress === 100 && currentTasks.length > 0 ? <><Icon name="Sparkles" className="w-8 h-8 text-yellow-300" /> 王者的完美達成！</> : `今日任務：${completedCount} / ${currentTasks.length}`}
                                            </p>
                                        </div>
                                    </div>
                                    
                                    <div className="flex-shrink-0 w-40 h-40 md:w-64 md:h-64 aspect-square flex items-center justify-center bg-white/10 rounded-full border-[10px] border-white/20 shadow-2xl backdrop-blur-md relative overflow-hidden group">
                                        {progress === 100 ? (
                                            <div className="relative animate-in zoom-in duration-500 flex items-center justify-center w-full h-full p-[22%] overflow-visible">
                                                <Icon name="Trophy" className="w-full h-full trophy-glow animate-bounce-fast" style={{ color: dynamicColor }} />
                                            </div>
                                        ) : (
                                            <span className="text-5xl md:text-8xl font-black z-10 text-white drop-shadow-md tracking-tighter">
                                                {progress}<span className="text-xl md:text-4xl ml-1 opacity-70">%</span>
                                            </span>
                                        )}
                                        <svg className="absolute inset-0 w-full h-full -rotate-90 p-0" viewBox="0 0 100 100">
                                            <circle cx="50" cy="50" r="44" fill="transparent" stroke="rgba(255,255,255,0.05)" strokeWidth="8" />
                                            <circle cx="50" cy="50" r="44" fill="transparent" stroke={dynamicColor} strokeWidth="8" strokeDasharray="276.46" strokeDashoffset={`${276.46 - (276.46 * progress / 100)}`} strokeLinecap="round" className="transition-all duration-1000 ease-in-out shadow-lg" />
                                        </svg>
                                    </div>
                                </div>
                            </div>

                            {/* 星期導航 */}
                            <div className="flex justify-around px-4 py-6 md:px-10 md:py-10 bg-white border-b border-slate-50 overflow-x-auto no-scrollbar gap-2 md:gap-6 flex-shrink-0">
                                {daysWithDates.map((day) => (
                                    <button key={day.id} onClick={() => setSelectedDay(day.id)}
                                        className={`flex-shrink-0 w-22 h-24 md:w-36 md:h-44 rounded-[2rem] md:rounded-[3.5rem] flex flex-col items-center justify-center transition-all duration-300 ${
                                            selectedDay === day.id ? (mode === 'kid' ? 'bg-orange-500 text-white shadow-2xl scale-110' : 'bg-indigo-600 text-white shadow-2xl scale-110') : 'text-slate-300 hover:bg-slate-50'
                                        }`}>
                                        <span className={`text-[20px] md:text-[28px] font-black mb-2 opacity-90 ${selectedDay === day.id ? 'text-white' : 'text-slate-500'}`}>
                                            {day.dateStr}
                                        </span>
                                        <span className="text-3xl md:text-5xl font-black tracking-tighter">{day.label}</span>
                                        {day.id === realDayOfWeek && <div className={`w-3 h-3 rounded-full mt-3 ${selectedDay === day.id ? 'bg-white' : 'bg-orange-400'}`} />}
                                    </button>
                                ))}
                            </div>

                            {/* 任務清單區 */}
                            <div className="scrollable-list no-scrollbar p-6 md:p-14 touch-pan-y">
                                {!isManageOpen && (
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-12">
                                        {currentTasks.length > 0 ? (
                                            currentTasks.map((task) => (
                                                <div key={task.id} onClick={() => toggleItem(task.id)}
                                                    className={`group flex items-center gap-6 p-10 rounded-[4rem] border-4 transition-all active:scale-[0.97] duration-300 ${
                                                        checkedItems[task.id] ? 'bg-emerald-50 border-emerald-300 shadow-inner' : (mode === 'kid' && selectedDay !== (realToday.getDay() || 7)) ? 'bg-slate-50 border-transparent opacity-30 cursor-not-allowed' : 'bg-white border-slate-100 shadow-sm hover:border-orange-200 cursor-pointer'
                                                    }`}
                                                >
                                                    <div className="flex-shrink-0 relative">
                                                        {checkedItems[task.id] ? (
                                                            <div className="bg-emerald-500 rounded-[2.5rem] p-7 shadow-2xl shadow-emerald-200">
                                                                <Icon name="CheckCircle2" className="w-12 h-12 text-white" />
                                                            </div>
                                                        ) : (
                                                            <div className={`w-24 h-24 rounded-[2.5rem] border-[14px] transition-all duration-300 ${mode === 'kid' ? 'border-orange-50 group-hover:border-orange-200' : 'border-indigo-50'}`} />
                                                        )}
                                                        {checkedItems[task.id] && <div className="absolute -top-6 -right-6"><Icon name="Star" className="w-14 h-14 text-yellow-400 fill-yellow-400 animate-spin" /></div>}
                                                    </div>
                                                    <div className="flex-1 overflow-hidden text-left">
                                                       <span className={`text-[14px] px-5 py-2 rounded-full font-black uppercase mb-4 inline-block shadow-sm ${
                                                        task.cat === '每天' ? 'bg-orange-100 text-orange-600' : task.cat === '平日' ? 'bg-blue-100 text-blue-600' : task.cat === '葛洛莉' ? 'bg-emerald-100 text-emerald-600' : task.cat === '週末' ? 'bg-purple-100 text-purple-600' : 'bg-slate-100 text-slate-600'
                                                      }`}>{task.cat || '日常'}</span>
                                                      <p className={`text-2xl sm:text-3xl md:text-5xl font-black leading-tight tracking-tighter text-slate-800 break-words ${checkedItems[task.id] ? 'opacity-25 italic' : ''}`}>
                                                        {task.title}
                                                      </p>
                                                    </div>
                                                </div>
                                            ))
                                        ) : (
                                            <div className="col-span-full py-40 text-center opacity-40">
                                                <Icon name="Heart" className="w-24 h-24 text-yellow-500 mx-auto mb-10 animate-pulse" />
                                                <h3 className="text-4xl font-black text-slate-300 italic tracking-tighter leading-tight text-center">今日暫無任務，休息萬歲！🏖️</h3>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {mode === 'parent' && (
                                    <div className="space-y-12">
                                        <div className="flex flex-col sm:flex-row justify-between items-center bg-indigo-50 p-12 rounded-[4rem] border border-indigo-100 gap-8 shadow-sm">
                                            <div className="flex items-center gap-6 text-indigo-900 font-black text-4xl italic">
                                                <Icon name="Settings2" className="w-12 h-12 text-indigo-400" /> 王者系統設定
                                            </div>
                                            <button onClick={() => {setIsManageOpen(!isManageOpen); setDeleteConfirmId(null);}} className="bg-indigo-600 text-white px-16 py-5 rounded-[2rem] font-black shadow-2xl hover:bg-indigo-700 active:scale-95 transition-all text-2xl">
                                                {isManageOpen ? '完成設定' : '開始修改清單'}
                                            </button>
                                        </div>

                                        {isManageOpen && (
                                            <div className="space-y-12">
                                                <button onClick={addTask} className="w-full py-16 border-4 border-dashed border-indigo-100 rounded-[4rem] text-indigo-400 font-black text-3xl hover:bg-indigo-50 flex items-center justify-center gap-6 transition-all">
                                                    <Icon name="Plus" className="w-12 h-12" /> 新增一個王者作息項目
                                                </button>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                                    {allTasks.map((task) => (
                                                        <div key={task.id} className="bg-white border-2 border-slate-100 p-12 rounded-[4rem] shadow-sm flex flex-col group relative overflow-visible">
                                                            {deleteConfirmId === task.id && (
                                                                <div className="absolute inset-0 bg-red-600/95 z-10 flex flex-col items-center justify-center p-12 text-white animate-in zoom-in duration-300 rounded-[4rem]">
                                                                    <p className="font-black text-3xl mb-8 text-center">確定刪除此任務？</p>
                                                                    <div className="flex gap-8 w-full px-12 text-center justify-center">
                                                                        <button onClick={() => confirmRemoveTask(task.id)} className="flex-1 bg-white text-red-600 py-4 rounded-2xl font-black shadow-xl active:scale-95 transition-all">刪除</button>
                                                                        <button onClick={() => setDeleteConfirmId(null)} className="flex-1 bg-red-800 text-white py-5 rounded-2xl font-black border border-red-400 active:scale-95 transition-all text-sm text-center">取消</button>
                                                                    </div>
                                                                </div>
                                                            )}
                                                            <div className="flex items-start gap-6 mb-10 text-left">
                                                                <div className="mt-4 cursor-grab active:cursor-grabbing text-slate-200 group-hover:text-indigo-400"><Icon name="GripVertical" className="w-10 h-10" /></div>
                                                                <div className="flex-1 text-left">
                                                                    <input value={task.title} onChange={(e) => updateTask(task.id, 'title', e.target.value)} className="w-full text-4xl font-black bg-slate-50 border-none rounded-2xl px-8 py-5 outline-none focus:ring-4 ring-indigo-50 text-left" />
                                                                </div>
                                                                <button onClick={() => setDeleteConfirmId(task.id)} className="p-5 text-slate-100 hover:text-red-500 rounded-3xl transition-all"><Icon name="Trash2" className="w-8 h-8" /></button>
                                                            </div>
                                                            <div className="flex items-center gap-4 px-10 text-center justify-center">
                                                                <div className="flex wrap gap-3 overflow-visible text-center">
                                                                    {baseDays.map(d => (
                                                                        <button key={d.id} onClick={() => toggleTaskRule(task.id, d.id)} className={`w-14 h-14 rounded-2xl text-lg font-black transition-all ${task.rule.includes(d.id) ? 'bg-indigo-600 text-white shadow-md scale-110' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>{d.label}</button>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                            {/* Footer */}
                            <div className="py-12 bg-slate-50 border-t border-slate-100 flex justify-center items-center flex-shrink-0 text-center text-center">
                                <div className="flex items-center gap-6 text-[14px] font-black text-slate-300 tracking-[0.7em] uppercase opacity-60 text-center">
                                   YANG YANG ROYAL v49.0
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 編輯彈窗 */}
                    {editingTask && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-xl z-[200] flex items-center justify-center p-6 animate-in fade-in duration-300 text-center" onClick={() => setEditingTask(null)}>
                            <div className="bg-white rounded-[5.5rem] shadow-2xl w-full max-w-xl overflow-hidden border-b-[35px] border-indigo-600" onClick={e => e.stopPropagation()}>
                                <div className="bg-indigo-600 p-14 text-white flex justify-between items-center shadow-lg">
                                    <h2 className="text-4xl font-black flex items-center gap-6 justify-center w-full"><Icon name="Crown" className="w-14 h-14 text-yellow-300" /> 皇家修改</h2>
                                    <button onClick={() => setEditingTask(null)} className="bg-white/20 p-6 rounded-[2rem] hover:bg-white/40 transition-all"><Icon name="X" className="w-12 h-12" /></button>
                                </div>
                                <div className="p-16 space-y-16 flex flex-col items-center text-center">
                                    <input value={editingTask.title} onChange={(e) => updateTask(editingTask.id, 'title', e.target.value)} className="w-full text-5xl font-black bg-slate-50 border-none rounded-[3.5rem] px-12 py-12 outline-none focus:ring-12 ring-indigo-50 transition-all text-center" />
                                    <div className="flex justify-between gap-5 overflow-visible px-4 w-full text-center">
                                        {baseDays.map(d => (
                                            <button key={d.id} onClick={() => toggleTaskRule(editingTask.id, d.id)} className={`flex-1 min-w-[4.5rem] h-24 rounded-[2rem] text-4xl font-black transition-all ${editingTask.rule.includes(d.id) ? 'bg-indigo-600 text-white shadow-2xl scale-110' : 'bg-slate-100 text-slate-300'}`}>{d.label}</button>
                                        ))}
                                    </div>
                                    <button onClick={() => setEditingTask(null)} className="w-full bg-indigo-600 text-white py-10 rounded-[3.5rem] font-black shadow-2xl active:scale-95 transition-all text-4xl hover:bg-indigo-700">完成設定</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
