      (function() {

    <style>
        /* 鎖定螢幕與防呆 */
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #e2e8f0; 
            user-select: none; -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }
        #root { height: 100%; width: 100%; } 
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 硬體加速動畫 */
        @keyframes bounce-fast { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10%) scale(1.05); } }
        .animate-bounce-fast { animation: bounce-fast 0.6s infinite ease-in-out; will-change: transform; }
        
        @keyframes confetti-fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
        .animate-confetti-fall { animation: confetti-fall linear infinite; will-change: transform, opacity; }

        /* 全螢幕雙層光芒特效 */
        .sunburst-layer-1 {
            background: repeating-conic-gradient(from 0deg, #FDE047 0deg 4deg, transparent 4deg 40deg);
            border-radius: 50%;
            animation: spin-rays 35s linear infinite;
        }
        .sunburst-layer-2 {
            background: repeating-conic-gradient(from 10deg, rgba(255,255,255,0.7) 0deg 3deg, transparent 3deg 45deg);
            border-radius: 50%;
            animation: spin-rays 20s linear infinite;
        }
        @keyframes spin-rays { 100% { transform: rotate(360deg); } }
        
        /* 修復版面：使用標準 Flex 佈局防止破圖 */
        .app-container { height: 100vh; display: flex; flex-direction: column; overflow: hidden; width: 100%; align-items: center; }
        
        .touch-none { touch-action: none; }

        .task-inner {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease, opacity 0.4s ease, background-color 0.4s ease, border-color 0.4s ease;
            transform-origin: center center;
            will-change: transform, opacity;
        }
        
        .sortable-ghost { opacity: 1 !important; }
        .sortable-ghost > div { background-color: #f8fafc !important; border: 2px dashed #cbd5e1 !important; box-shadow: inset 0 4px 10px rgba(0,0,0,0.05) !important; opacity: 0.5 !important; }
        .sortable-drag { opacity: 1 !important; cursor: grabbing !important; z-index: 9999 !important; }
        .sortable-drag > div { background-color: #ffffff !important; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.2), 0 0 0 2px rgba(99,102,241,0.6) !important; border-color: transparent !important; transform: scale(1.02) rotate(1deg) !important; }
        
        @keyframes check-pop { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.3); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .animate-check-pop { animation: check-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; will-change: transform, opacity; }
        
        @keyframes particle-blast { 0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(180deg); opacity: 0; } }
        .animate-particle { animation: particle-blast 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; will-change: transform, opacity; }
        
        @keyframes happy-dance { 0%, 100% { transform: translateY(0) scale(1); } 20% { transform: translateY(-8px) scale(1.03) rotate(-2deg); } 40% { transform: translateY(0px) scale(1.03) rotate(2deg); } 60% { transform: translateY(-4px) scale(1.03) rotate(-1deg); } 80% { transform: translateY(0px) scale(1.03) rotate(1deg); } }
        .animate-happy-dance { animation: happy-dance 0.7s ease-in-out forwards; box-shadow: 0 0 30px rgba(52, 211, 153, 0.5) !important; border-color: #34d399 !important; z-index: 50; will-change: transform; }

        @keyframes slide-down-fade { from { opacity: 0; transform: translateY(-10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .animate-slide-down { animation: slide-down-fade 0.3s cubic-bezier(0.2, 1, 0.2, 1) forwards; }

        @keyframes shake-error { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-10px); } 40% { transform: translateX(10px); } 60% { transform: translateX(-10px); } 80% { transform: translateX(10px); } }
        .animate-shake { animation: shake-error 0.5s ease-in-out; }
    </style>
</head>

    <script type="text/babel">

        const ICONS_DATA = {

            Lock: <Fragment><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Fragment>,
            Fingerprint: <Fragment><path d="M2 12C2 6.48 6.48 2 12 2s10 4.48 10 10"/><path d="M5 15.5C3.12 13.9 2 11.58 2 9c0-5.52 4.48-10 10-10s10 4.48 10 10c0 2.58-1.12 4.9-2.99 6.5"/><path d="M8.5 19C6.38 17.5 5 15.14 5 12.5c0-3.87 3.13-7 7-7s7 3.13 7 7c0 2.64-1.38 5-3.5 6.5"/><path d="M12 22v-4"/><path d="M12 14v-2"/><path d="M15.5 19c1.62-1.5 2.5-3.64 2.5-6 0-2.21-1.79-4-4-4s-4 1.79-4 4c0 2.36.88 4.5 2.5 6"/></Fragment>,
            Download: <Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Fragment>,
            Upload: <Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Fragment>,
            ChartLine: <Fragment><polyline points="3 3 3 21 21 21"/><polyline points="3 14 8 9 13 14 21 5"/></Fragment>
        };

        function Icon({ name, className = "w-6 h-6", style = {}, strokeWidth = 2.5 }) {
            return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={style}>{ICONS_DATA[name]}</svg>;
        }

        function MagicSparkles() {
            return (
                <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-[100]">
                    {[...Array(8)].map((_, i) => {
                        const angle = (i * 45) * Math.PI / 180;
                        const distance = 40 + Math.random() * 30;
                        const tx = Math.cos(angle) * distance + 'px';
                        const ty = Math.sin(angle) * distance + 'px';
                        const colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b'];
                        const color = colors[i % colors.length];
                        const size = 5 + Math.random() * 6; 
                        return <div key={i} className="absolute rounded-full animate-particle" style={{ width: `${size}px`, height: `${size}px`, '--tx': tx, '--ty': ty, backgroundColor: color }} />
                    })}
                </div>
            );
        }

        function CustomNewTrophy({ color }) {
            return (
                <svg viewBox="0 0 100 100" fill="none" stroke={color} xmlns="http://www.w3.org/2000/svg" className="w-16 h-16 sm:w-20 sm:h-20 md:w-24 md:h-24 trophy-glow animate-bounce-fast" style={{ filter: `drop-shadow(0 0 10px ${color})` }}>
                    <path d="M20 30 H10 v10 a10 10 0 0 0 10 10 M80 30 H90 v10 a10 10 0 0 1 -10 10" strokeWidth="8" strokeLinecap="round" strokeLinejoin="round"/>
                    <path d="M20 20 H80 V40 A 30 30 0 0 1 20 40 Z" fill={color} fillOpacity="0.2" strokeWidth="8" strokeLinejoin="round"/>
                    <path d="M45 70 H55 V85 H45 Z" fill={color} fillOpacity="0.2" strokeWidth="8" strokeLinejoin="round"/>
                    <path d="M30 85 H70 V95 H30 Z" fill={color} fillOpacity="0.2" strokeWidth="8" strokeLinejoin="round"/>
                    <path d="M50 28 L52.5 36 H61 L54 41 L56.5 50 L50 44.5 L43.5 50 L46 41 L39 36 H47.5 Z" fill={color} stroke="none"/>
                </svg>
            );
        }

        function RoyalRays() {
            return (
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[250vmax] h-[250vmax] pointer-events-none z-[-1] opacity-75"
                     style={{ maskImage: 'radial-gradient(circle, transparent 5%, black 15%)', WebkitMaskImage: 'radial-gradient(circle, transparent 5%, black 15%)' }}>
                    <div className="absolute inset-0 sunburst-layer-1" />
                    <div className="absolute inset-0 sunburst-layer-2" />
                </div>
            );
        }

        const defaultTasks = [
            { id: '1', cat: '每天', title: '聽英文', rule: [1, 3, 4, 6] },
            { id: '2', cat: '每天', title: '背誦或複習一個單字', rule: [1, 3, 4, 6] },
            { id: '3', cat: '每天', title: '跳繩300下或運動30分鐘', rule: [1, 3, 4, 6] },
            { id: '4', cat: '平日', title: '整理書包：乾淨餐具', rule: [1, 3, 4, 6] },
            { id: '5', cat: '平日', title: '整理書包：隔天衣服', rule: [1, 3, 4, 6] },
            { id: '6', cat: '平日', title: '整理書包：水壺放餐桌', rule: [1, 3, 4, 6] },
            { id: '7', cat: '平日', title: '整理書包：口罩放貓咪掛勾', rule: [1, 3, 4, 6] },
            { id: '8', cat: '平日', title: '把髒的碗放到廚房', rule: [1, 3, 4] },
            { id: '9', cat: '平日', title: '聯絡本放餐桌', rule: [1, 3, 4, 6] },
            { id: '10', cat: '平日', title: '吃營養品', rule: [1, 2, 3, 4, 5] },
            { id: '11', cat: '平日', title: '看一次時鐘告訴爸媽幾點', rule: [1, 3, 4, 6] },
            { id: '12', cat: '平日', title: '聽與背誦九九乘法表', rule: [1, 3, 4, 6] },
            { id: '13', cat: '周六', title: '準備與檢查兩種鉛筆盒', rule: [6] },
            { id: '14', cat: '周六', title: '檢查書包有沒有垃圾', rule: [6] },
            { id: '15', cat: '周六', title: '補充口罩或衛生紙包', rule: [6] },
            { id: '16', cat: '葛洛莉', title: '把小水壺放在餐桌上', rule: [3, 6] },
            { id: '17', cat: '葛洛莉', title: '把英文功課寫完', rule: [3, 6] },
            { id: '18', cat: '葛洛莉', title: '聯絡簿與Green Card放餐桌', rule: [3, 6] },
            { id: '19', cat: '週末', title: '喝小安素', rule: [6, 7] }
        ];

        // 徹底放棄帶有版號的 DB 名稱，確保 PWA 更新後資料永遠不流失
        const DB_NAME = 'YangYangRoyal_PROD'; 
        const STORE_NAME = 'ChecklistData';
        
        const getYYYYMMDD = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;

        // 徹底放棄帶有版號的 Keys，避免更新後空空如也
        const STORAGE_KEYS = {
            TASKS: 'yang_data_tasks', TASKS_BAK: 'yang_data_tasks_bak',
            PROGRESS: (dateStr) => `yang_data_checked_${dateStr}`, PROGRESS_BAK: (dateStr) => `yang_data_checked_${dateStr}_bak`,
            COMPLETED_DATES: 'yang_data_completed_dates',
            REWARDS: 'yang_data_rewards',
            EXAMS: 'yang_data_exams',
            EXAM_SUBJECTS: 'yang_data_exam_subjects',
            EXAM_TYPES: 'yang_data_exam_types',
            EXAM_UNITS: 'yang_data_exam_units',
            EVENTS: 'yang_data_events',
            EXAM_RULES: 'yang_data_exam_rules',
            PARENT_PIN: 'yang_data_parent_pin',
            PARENT_BIO: 'yang_data_parent_bio_id'
        };

        const EVENT_TYPES = {
            'school': { label: '學校', color: 'bg-blue-100 text-blue-700 border-blue-200' },
            'aftercare': { label: '安親班', color: 'bg-emerald-100 text-emerald-700 border-emerald-200' },
            'gloria': { label: '葛洛莉', color: 'bg-purple-100 text-purple-700 border-purple-200' },
            'leave': { label: '請假', color: 'bg-red-100 text-red-700 border-red-200' }
        };

        const openDB = () => {
            return new Promise((resolve) => {
                try {
                    const request = indexedDB.open(DB_NAME, 1);
                    request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => resolve(null);
                } catch(e) { resolve(null); }
            });
        };

        const idbSave = async (key, data) => { try { const db = await openDB(); if(db) db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).put(data, key); } catch (e) {} };
        const idbLoad = async (key) => {
            try {
                const db = await openDB();
                if (!db) return null;
                return new Promise((resolve) => {
                    const request = db.transaction(STORE_NAME, 'readonly').objectStore(STORE_NAME).get(key);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => resolve(null);
                });
            } catch (e) { return null; }
        };

        const saveTimeouts = {}; 
        
        const robustSave = (key, backupKey, data) => {
            const json = JSON.stringify(data);
            try { localStorage.setItem(key, json); localStorage.setItem(backupKey, json); } catch (e) {}
            if (saveTimeouts[key]) clearTimeout(saveTimeouts[key]);
            saveTimeouts[key] = setTimeout(() => idbSave(key, data), 500); 
        };

        const robustLoad = async (key, backupKey, defaultValue) => {
            try {
                let primary = localStorage.getItem(key);
                if (!primary) primary = localStorage.getItem(key.replace('yang_data_', 'yang_v92_')); // 向下相容
                if (primary) return JSON.parse(primary);
                
                let backup = localStorage.getItem(backupKey);
                if (!backup && backupKey) backup = localStorage.getItem(backupKey.replace('yang_data_', 'yang_v92_'));
                if (backup) return JSON.parse(backup);
            } catch (e) {}
            
            const idbData = await idbLoad(key);
            if (idbData) return idbData;
            
            return defaultValue;
        };

        const baseDays = [
            { id: 1, label: '一' }, { id: 2, label: '二' }, { id: 3, label: '三' },
            { id: 4, label: '四' }, { id: 5, label: '五' }, { id: 6, label: '六' }, { id: 7, label: '日' },
        ];

        // 獨立於組件外的全域輔助函式
        const isDayActuallyCompleted = (dateStr, completedSet, allTasks) => {
            if (completedSet.has(dateStr)) return true;
            const dObj = new Date(dateStr);
            const dow = dObj.getDay() || 7;
            const tasksForDay = allTasks.filter(t => t.rule.includes(dow));
            return tasksForDay.length === 0;
        };

        const triggerVibration = () => { try { if (window.navigator && window.navigator.vibrate) window.navigator.vibrate([30, 50, 30]); } catch (e) {} };

        const playSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const gain = ctx.createGain();
                gain.connect(ctx.destination);

                if (type === 'check') {
                    const osc = ctx.createOscillator();
                    osc.connect(gain);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.1);
                } else if (type === 'uncheck') {
                    const osc = ctx.createOscillator();
                    osc.connect(gain);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.1);
                } else if (type === 'tada') {
                    const freqs = [523.25, 659.25, 783.99, 1046.50]; 
                    freqs.forEach((f, i) => {
                        const osc = ctx.createOscillator();
                        const g = ctx.createGain();
                        osc.connect(g);
                        g.connect(ctx.destination);
                        osc.type = 'triangle';
                        osc.frequency.value = f;
                        g.gain.setValueAtTime(0, ctx.currentTime + i * 0.1);
                        g.gain.linearRampToValueAtTime(0.2, ctx.currentTime + i * 0.1 + 0.05);

            return `${m}月第${weekNames[weekNum - 1] || weekNum}週`;

            useEffect(() => {

                            forceFallback: true, fallbackTolerance: 3, 
                            onEnd: (evt) => {

                                if (oldIndex !== newIndex && oldIndex !== undefined && newIndex !== undefined) {
                                    const parent = evt.to;

                                    parent.insertBefore(item, sibling);

                            }

                    if (sortableInstanceRef.current) { sortableInstanceRef.current.destroy(); sortableInstanceRef.current = null; }
                }
            });

            // 初始化載入
            useEffect(() => {
                const initData = async () => {
                    const tasks = await robustLoad(STORAGE_KEYS.TASKS, STORAGE_KEYS.TASKS_BAK, defaultTasks);
                    setAllTasks(Array.isArray(tasks) && tasks.length > 0 ? tasks : defaultTasks);
                    const dates = await robustLoad(STORAGE_KEYS.COMPLETED_DATES, STORAGE_KEYS.COMPLETED_DATES + '_bak', []);
                    setCompletedDates(dates);
                    const rewardsData = await robustLoad(STORAGE_KEYS.REWARDS, STORAGE_KEYS.REWARDS + '_bak', []);
                    setRewards(rewardsData);
                    const examsData = await robustLoad(STORAGE_KEYS.EXAMS, STORAGE_KEYS.EXAMS + '_bak', []);
                    setExams(examsData);
                    const subjectsData = await robustLoad(STORAGE_KEYS.EXAM_SUBJECTS, STORAGE_KEYS.EXAM_SUBJECTS + '_bak', ['國語', '數學', '英文', '社會', '自然']);
                    setExamSubjects(subjectsData);
                    const typesData = await robustLoad(STORAGE_KEYS.EXAM_TYPES, STORAGE_KEYS.EXAM_TYPES + '_bak', ['平時考', '期中考', '期末考', '複習考']);
                    setExamTypes(typesData);
                    const unitsData = await robustLoad(STORAGE_KEYS.EXAM_UNITS, STORAGE_KEYS.EXAM_UNITS + '_bak', ['單元', '課', '章', '回']);
                    setExamUnits(unitsData);
                    const eventsData = await robustLoad(STORAGE_KEYS.EVENTS, STORAGE_KEYS.EVENTS + '_bak', []);
                    setEvents(eventsData);
                    const rulesData = await robustLoad(STORAGE_KEYS.EXAM_RULES, STORAGE_KEYS.EXAM_RULES + '_bak', []);
                    setExamRules(rulesData);
                    
                    const savedPin = localStorage.getItem(STORAGE_KEYS.PARENT_PIN);
                    if (!savedPin) localStorage.setItem(STORAGE_KEYS.PARENT_PIN, '0000');
                    setHasBioBound(!!localStorage.getItem(STORAGE_KEYS.PARENT_BIO));
                };
                initData();
            }, []);

            // 初始化分析的預設科目
            useEffect(() => {
                if (exams.length > 0 && !analysisSubject) {
                    const availableSubjects = Array.from(new Set(exams.map(e => e.subject)));
                    if (availableSubjects.length > 0) setAnalysisSubject(availableSubjects[0]);
                }
            }, [exams, analysisSubject]);

            // 日期切換時載入資料
            useEffect(() => {
                if (!activeDateStr) return;
                let isMounted = true;
                const initProgress = async () => {
                    setIsLoadingProgress(true);
                    const checked = await robustLoad(STORAGE_KEYS.PROGRESS(activeDateStr), STORAGE_KEYS.PROGRESS_BAK(activeDateStr), {});
                    if (isMounted) {
                        setCheckedItems(checked);
                        setSortingCheckedItems(checked);
                        setCelebratingCards({}); 
                        setTeleportingCards({});
                        setIsLoadingProgress(false);
                    }
                };
                initProgress();
                return () => { isMounted = false; };
            }, [activeDateStr]); 

            const checkAndUpdateCompletion = (dateStr, dow, currentChecked) => {
                const dayTasks = allTasks.filter(t => t.rule.includes(dow));
                const isComplete = dayTasks.length === 0 || dayTasks.filter(t => currentChecked[t.id]).length === dayTasks.length;

                setCompletedDates(prev => {
                    const hasIt = prev.includes(dateStr);
                    if (isComplete && !hasIt) {
                        const next = [...prev, dateStr];
                        robustSave(STORAGE_KEYS.COMPLETED_DATES, STORAGE_KEYS.COMPLETED_DATES + '_bak', next);
                        return next;
                    } else if (!isComplete && hasIt) {
                        const next = prev.filter(d => d !== dateStr);
                        robustSave(STORAGE_KEYS.COMPLETED_DATES, STORAGE_KEYS.COMPLETED_DATES + '_bak', next);
                        return next;
                    }
                    return prev;
                });
            };

            const currentTasks = useMemo(() => {
                const filtered = allTasks.filter(t => t.rule.includes(selectedDay));
                return filtered.sort((a, b) => {
                    const aChecked = sortingCheckedItems[a.id] === true;
                    const bChecked = sortingCheckedItems[b.id] === true;
                    if (aChecked === bChecked) return allTasks.findIndex(t => t.id === a.id) - allTasks.findIndex(t => t.id === b.id);
                    return aChecked ? 1 : -1;
                });
            }, [selectedDay, allTasks, sortingCheckedItems]);
            
            const completedCount = currentTasks.filter(t => checkedItems[t.id]).length;
            const progress = currentTasks.length ? Math.round((completedCount / currentTasks.length) * 100) : 0;

            const currentStreak = useMemo(() => {
                const checkIsCompleted = (dateObj) => {
                    const dateStr = getYYYYMMDD(dateObj);
                    return isDayActuallyCompleted(dateStr, new Set(completedDates), allTasks);
                };

                let streak = 0; let checkDate = new Date(realToday);
                if (checkIsCompleted(checkDate)) { streak++; checkDate.setDate(checkDate.getDate() - 1); }
                else { checkDate.setDate(checkDate.getDate() - 1); if (checkIsCompleted(checkDate)) { streak++; checkDate.setDate(checkDate.getDate() - 1); } else { return 0; } }
                while (true) { if (checkIsCompleted(checkDate)) { streak++; checkDate.setDate(checkDate.getDate() - 1); } else { break; } }
                return streak;
            }, [completedDates, realToday, allTasks]);

            const currentWeekProgress = useMemo(() => {
                const mon = new Date(realToday);
                const day = mon.getDay() || 7;
                mon.setDate(mon.getDate() - day + 1); 
                let count = 0;
                const completedSet = new Set(completedDates);
                for(let i=0; i<7; i++) {
                    const cur = new Date(mon); cur.setDate(cur.getDate() + i);
                    if (isDayActuallyCompleted(getYYYYMMDD(cur), completedSet, allTasks)) count++;
                }
                return count;
            }, [realToday, completedDates, allTasks]);

            const currentMonthProgress = useMemo(() => {
                const y = realToday.getFullYear(); const m = realToday.getMonth() + 1;
                const daysInMonth = new Date(y, m, 0).getDate();
                let count = 0;
                const completedSet = new Set(completedDates);
                for(let i=1; i<=daysInMonth; i++) {
                    const cur = `${y}-${String(m).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                    if (isDayActuallyCompleted(cur, completedSet, allTasks)) count++;
                }
                return { count, total: daysInMonth };
            }, [realToday, completedDates, allTasks]);

            const isPeriodFullyCompleted = useCallback((periodId) => {
                const completedSet = new Set(completedDates);
                if (periodId.startsWith('W-')) {
                    const dateStr = periodId.substring(2); const start = new Date(dateStr);
                    for(let i=0; i<7; i++) {
                        const cur = new Date(start); cur.setDate(cur.getDate() + i);
                        if (!isDayActuallyCompleted(getYYYYMMDD(cur), completedSet, allTasks)) return false;
                    }
                    return true;
                } else if (periodId.startsWith('M-')) {
                    const parts = periodId.substring(2).split('-'); const y = parseInt(parts[0], 10); const m = parseInt(parts[1], 10);
                    const daysInMonth = new Date(y, m, 0).getDate();
                    for(let i=1; i<=daysInMonth; i++) {
                        const cur = `${y}-${String(m).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                        if (!isDayActuallyCompleted(cur, completedSet, allTasks)) return false;
                    }
                    return true;
                } else if (periodId.startsWith('EXAM-')) {
                    const ruleId = periodId.substring(5).split('-')[0];
                    const rule = examRules.find(r => r.id === ruleId);
                    if (!rule) return false; 
                    const validExams = exams.filter(e => {
                        const matchType = rule.type === '不限' || e.type === rule.type;
                        const matchSubj = rule.subject === '不限' || e.subject === rule.subject;
                        return matchType && matchSubj && e.score >= rule.minScore;
                    });
                    const claimCountForRule = rewards.filter(r => r.ruleId === rule.id).length;
                    return validExams.length >= claimCountForRule * rule.requiredCount;
                }
                return true;
            }, [completedDates, allTasks, examRules, exams, rewards]);

            const unclaimedRewards = useMemo(() => {
                const completedSet = new Set(completedDates);
                const available = [];

                const startOfWeek = new Date(realToday);
                const day = startOfWeek.getDay() || 7;
                startOfWeek.setDate(startOfWeek.getDate() - day + 1);

                for (let w = 0; w < 8; w++) {
                    const mon = new Date(startOfWeek); mon.setDate(mon.getDate() - w * 7);
                    const wId = `W-${getYYYYMMDD(mon)}`;
                    if (rewards.some(r => r.periodId === wId)) continue; 

                    let isFull = true;
                    for(let i=0; i<7; i++) {
                        const cur = new Date(mon); cur.setDate(cur.getDate() + i);
                        if (!isDayActuallyCompleted(getYYYYMMDD(cur), completedSet, allTasks)) { isFull = false; break; }
                    }
                    if (isFull) {
                        const end = new Date(mon); end.setDate(end.getDate() + 6);
                        available.push({ periodId: wId, type: 'weekly', label: `${getWeekLabel(getYYYYMMDD(mon))} 達成 (${mon.getMonth()+1}/${mon.getDate()}~${end.getMonth()+1}/${end.getDate()})` });
                    }
                }

                const startOfMonth = new Date(realToday.getFullYear(), realToday.getMonth(), 1);
                for (let m = 0; m < 6; m++) {
                    const curMonth = new Date(startOfMonth.getFullYear(), startOfMonth.getMonth() - m, 1);
                    const mId = `M-${curMonth.getFullYear()}-${String(curMonth.getMonth()+1).padStart(2,'0')}`;
                    if (rewards.some(r => r.periodId === mId)) continue;

                    const daysInMonth = new Date(curMonth.getFullYear(), curMonth.getMonth()+1, 0).getDate();
                    let isFull = true;
                    for(let i=1; i<=daysInMonth; i++) {
                        const cur = `${curMonth.getFullYear()}-${String(curMonth.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                        if (!isDayActuallyCompleted(cur, completedSet, allTasks)) { isFull = false; break; }
                    }
                    if (isFull) available.push({ periodId: mId, type: 'monthly', label: `${curMonth.getMonth()+1}月份 全月達成` });
                }

                examRules.forEach(rule => {
                    const validExams = exams.filter(e => {
                        const matchType = rule.type === '不限' || e.type === rule.type;
                        const matchSubj = rule.subject === '不限' || e.subject === rule.subject;
                        const matchScore = e.score >= rule.minScore;
                        return matchType && matchSubj && matchScore;
                    });
                    const possibleClaims = Math.floor(validExams.length / rule.requiredCount);
                    const claimedCount = rewards.filter(r => r.ruleId === rule.id).length;
                    
                    if (possibleClaims > claimedCount) {
                        available.push({
                            periodId: `EXAM-${rule.id}`, 
                            ruleId: rule.id, 
                            type: 'exam',
                            count: possibleClaims - claimedCount,
                            label: `考試達標: ${rule.type === '不限' ? '' : rule.type}${rule.subject === '不限' ? '各科' : rule.subject} ${rule.minScore}分滿${rule.requiredCount}次`,
                            defaultRewardName: rule.rewardName
                        });
                    }
                });

                return available.sort((a,b) => b.periodId.localeCompare(a.periodId)); 
            }, [completedDates, allTasks, rewards, realToday, examRules, exams]);

            const parentCalendarData = useMemo(() => {
                const base = new Date(realToday);
                base.setMonth(base.getMonth() + parentMonthOffset);

                const month = base.getMonth();
                const firstDay = new Date(year, month, 1).getDay() || 7;
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                const data = [];
                for(let i = 1; i < firstDay; i++) data.push(null);
                
                for(let i = 1; i <= daysInMonth; i++) {
                    const d = new Date(year, month, i);
                    const dateStr = getYYYYMMDD(d);
                    const dow = d.getDay() || 7;
                    const dayTasks = allTasks.filter(t => t.rule.includes(dow));
                    
                    let checked = {};

                        checked = checkedItems;

                    const completedCount = dayTasks.filter(t => checked[t.id]).length;
                    const dayEvents = events.filter(e => e.dateStr === dateStr);
                    
                    data.push({ date: i, dateStr, dow, total: dayTasks.length, uncompleted: dayTasks.length - completedCount, checkedData: checked, events: dayEvents });
                }
                return { year, month: month + 1, data };
            }, [parentMonthOffset, allTasks, realToday, events, checkedItems, activeDateStr, syncTrigger]);

            // 考試專用月曆資料
            const examCalendarData = useMemo(() => {
                const base = new Date(realToday);
                base.setMonth(base.getMonth() + examMonthOffset);
                const year = base.getFullYear();
                const month = base.getMonth();

                const daysInMonth = new Date(year, month + 1, 0).getDate();

                const data = [];
                for(let i = 1; i < firstDay; i++) data.push(null);
                
                for(let i = 1; i <= daysInMonth; i++) {
                    const d = new Date(year, month, i);
                    const dateStr = getYYYYMMDD(d);
                    const dayExams = exams.filter(e => e.dateStr === dateStr);
                    data.push({ date: i, dateStr, exams: dayExams });
                }
                return { year, month: month + 1, data };
            }, [examMonthOffset, realToday, exams]);

            const selectedLogDayObj = useMemo(() => {
                return parentCalendarData.data.find(d => d && d.dateStr === selectedLogDateStr);
            }, [parentCalendarData, selectedLogDateStr]);

            const logDayTasks = useMemo(() => {
                if (!selectedLogDayObj) return [];
                return allTasks.filter(t => t.rule.includes(selectedLogDayObj.dow)).sort((a, b) => {
                    const aC = selectedLogDayObj.checkedData[a.id];
                    const bC = selectedLogDayObj.checkedData[b.id];
                    if (aC === bC) return allTasks.findIndex(t=>t.id===a.id) - allTasks.findIndex(t=>t.id===b.id);
                    return aC ? 1 : -1; 
                });
            }, [selectedLogDayObj, allTasks]);

            // ================= 核心動作處理區 ================= //

            const handleLogTask = (taskId, dayObj) => {
                const raw = localStorage.getItem(STORAGE_KEYS.PROGRESS(dayObj.dateStr));
                const freshChecked = raw ? JSON.parse(raw) : { ...dayObj.checkedData };
                const isCurrentlyChecked = !!freshChecked[taskId];
                
                if (isCurrentlyChecked) playSound('uncheck');
                else playSound('check');

                setAnimatingLogTasks(prev => ({ ...prev, [taskId]: !isCurrentlyChecked ? 'checking' : 'unchecking' }));
                
                setTimeout(() => {
                    const updatedChecked = { ...freshChecked, [taskId]: !isCurrentlyChecked };
                    robustSave(STORAGE_KEYS.PROGRESS(dayObj.dateStr), STORAGE_KEYS.PROGRESS_BAK(dayObj.dateStr), updatedChecked);
                    checkAndUpdateCompletion(dayObj.dateStr, dayObj.dow, updatedChecked);
                    
                    if (dayObj.dateStr === activeDateStr) {
                        setCheckedItems(updatedChecked);
                        setSortingCheckedItems(updatedChecked);
                    }

                    setSyncTrigger(prev => prev + 1); 
                    
                    setAnimatingLogTasks(prev => { const next = {...prev}; delete next[taskId]; return next; });
                }, 250); 
            };

            const toggleItem = async (id) => {
                if (mode === 'kid' && isFutureDate) return; 
                if (mode === 'kid' && selectedDay !== (realToday.getDay() || 7)) return; 
                if (isAnimatingRef.current) return; 
                
                const isNowChecked = !checkedItems[id];
                const updatedChecked = { ...checkedItems, [id]: isNowChecked };
                
                setCheckedItems(updatedChecked);
                robustSave(STORAGE_KEYS.PROGRESS(activeDateStr), STORAGE_KEYS.PROGRESS_BAK(activeDateStr), updatedChecked);
                checkAndUpdateCompletion(activeDateStr, selectedDay, updatedChecked);
                
                const nextCompletedCount = currentTasks.filter(t => updatedChecked[t.id]).length;
                const isFullComplete = isNowChecked && nextCompletedCount === currentTasks.length && currentTasks.length > 0;

                if (isNowChecked) {
                    isAnimatingRef.current = true;
                    playSound('check');
                    triggerVibration(); 
                    
                    setCelebratingCards(prev => ({ ...prev, [id]: true }));
                    await delay(600); 

                    setTeleportingCards(prev => ({ ...prev, [id]: true }));
                    await delay(300); 

                    setSortingCheckedItems(prev => ({ ...prev, [id]: true }));
                    await delay(50); 

                    setCelebratingCards(prev => ({ ...prev, [id]: false }));
                    setTeleportingCards(prev => ({ ...prev, [id]: false })); 
                    
                    if (isFullComplete) {
                        setShowCelebration(true);
                        playSound('tada'); 
                    }
                    isAnimatingRef.current = false;
                } else {
                    playSound('uncheck');
                    setSortingCheckedItems(updatedChecked); 
                    setCelebratingCards(prev => ({ ...prev, [id]: false }));
                    setTeleportingCards(prev => ({ ...prev, [id]: false }));
                }
            };

            const handleAddExam = () => {
                if (!examSubject || !examScore) return;
                let scoreNum = parseInt(examScore, 10);
                if (isNaN(scoreNum)) scoreNum = 0; if (scoreNum < 0) scoreNum = 0; if (scoreNum > 100) scoreNum = 100;
                
                const finalUnit = (!examUnitPrefix.endsWith('考') && !examUnitPrefix.endsWith('測驗') && examUnitNumber) 
                    ? `第${examUnitNumber}${examUnitPrefix}` 
                    : examUnitPrefix;

                const newExam = { id: Date.now().toString(), dateStr: examDate || selectedExamDateStr, subject: examSubject, type: examType, unit: finalUnit, score: scoreNum };
                const updated = [newExam, ...exams];
                setExams(updated); robustSave(STORAGE_KEYS.EXAMS, STORAGE_KEYS.EXAMS + '_bak', updated);
                setShowExamModal(false); setExamSubject(''); setExamScore(''); setExamUnitPrefix('單元'); setExamUnitNumber('');
                if (scoreNum === 100) { playSound('tada'); setShowCelebration(true); } else if (scoreNum >= 90) { playSound('check'); }
            };

            const handleDeleteExam = (id) => {
                const updated = exams.filter(e => e.id !== id);
                setExams(updated); robustSave(STORAGE_KEYS.EXAMS, STORAGE_KEYS.EXAMS + '_bak', updated);
            };

            const handleAddSubject = () => {
                if(!newSubjectInput.trim() || examSubjects.includes(newSubjectInput.trim())) return;
                const updated = [...examSubjects, newSubjectInput.trim()];
                setExamSubjects(updated); robustSave(STORAGE_KEYS.EXAM_SUBJECTS, STORAGE_KEYS.EXAM_SUBJECTS + '_bak', updated);
                setNewSubjectInput('');
            };
            const handleDeleteSubject = (sub) => {
                const updated = examSubjects.filter(s => s !== sub);
                setExamSubjects(updated); robustSave(STORAGE_KEYS.EXAM_SUBJECTS, STORAGE_KEYS.EXAM_SUBJECTS + '_bak', updated);
            };

            const handleAddType = () => {
                if(!newTypeInput.trim() || examTypes.includes(newTypeInput.trim())) return;
                const updated = [...examTypes, newTypeInput.trim()];
                setExamTypes(updated); robustSave(STORAGE_KEYS.EXAM_TYPES, STORAGE_KEYS.EXAM_TYPES + '_bak', updated);
                setNewTypeInput('');
            };
            const handleDeleteType = (type) => {
                const updated = examTypes.filter(t => t !== type);
                setExamTypes(updated); robustSave(STORAGE_KEYS.EXAM_TYPES, STORAGE_KEYS.EXAM_TYPES + '_bak', updated);
            };

            const handleAddUnit = () => {
                if(!newUnitInput.trim() || examUnits.includes(newUnitInput.trim())) return;
                const updated = [...examUnits, newUnitInput.trim()];
                setExamUnits(updated); robustSave(STORAGE_KEYS.EXAM_UNITS, STORAGE_KEYS.EXAM_UNITS + '_bak', updated);
                setNewUnitInput('');
            };
            const handleDeleteUnit = (u) => {
                const updated = examUnits.filter(x => x !== u);
                setExamUnits(updated); robustSave(STORAGE_KEYS.EXAM_UNITS, STORAGE_KEYS.EXAM_UNITS + '_bak', updated);
            };

            const addTask = () => {
                const newTask = { id: Date.now().toString(), cat: '日常', title: '', rule: [1, 3, 4] };
                const updated = [newTask, ...allTasks];
                setAllTasks(updated); robustSave(STORAGE_KEYS.TASKS, STORAGE_KEYS.TASKS_BAK, updated); setSyncTrigger(prev => prev + 1);
            };

            const confirmRemoveTask = (id) => {
                const updated = allTasks.filter(t => t.id !== id);
                setAllTasks(updated); robustSave(STORAGE_KEYS.TASKS, STORAGE_KEYS.TASKS_BAK, updated);
                setDeleteConfirmId(null); setSyncTrigger(prev => prev + 1);
            };

            const updateTask = (id, field, value) => {
                const updated = allTasks.map(t => t.id === id ? { ...t, [field]: value } : t);
                setAllTasks(updated); robustSave(STORAGE_KEYS.TASKS, STORAGE_KEYS.TASKS_BAK, updated); setSyncTrigger(prev => prev + 1);
            };

            const toggleTaskRule = (taskId, dayId) => {
                const updated = allTasks.map(t => {
                    if (t.id === taskId) {
                        const newRule = t.rule.includes(dayId) ? t.rule.filter(d => d !== dayId) : [...t.rule, dayId].sort();
                        return { ...t, rule: newRule };
                    }
                    return t;
                });
                setAllTasks(updated); robustSave(STORAGE_KEYS.TASKS, STORAGE_KEYS.TASKS_BAK, updated); setSyncTrigger(prev => prev + 1);
            };

            const handleClaimReward = (rewardObj) => {
                const title = pendingRewardsInputs[rewardObj.periodId] !== undefined ? pendingRewardsInputs[rewardObj.periodId] : rewardObj.defaultRewardName;
                if (!title || !title.trim()) return;

                let sortKey = rewardObj.periodId.substring(2);
                if (rewardObj.type === 'monthly') sortKey += '-01';
                if (rewardObj.type === 'exam') sortKey = getYYYYMMDD(realToday) + '-' + Date.now();

                const newRecord = {
                    id: Date.now().toString(),
                    periodId: rewardObj.type === 'exam' ? `${rewardObj.periodId}-${Date.now()}` : rewardObj.periodId,
                    periodLabel: rewardObj.label,
                    title: title.trim(),
                    date: formattedDate,
                    type: rewardObj.type,
                    ruleId: rewardObj.ruleId,
                    sortKey: sortKey
                };
                const updated = [newRecord, ...rewards];
                setRewards(updated); robustSave(STORAGE_KEYS.REWARDS, STORAGE_KEYS.REWARDS + '_bak', updated);
                
                setPendingRewardsInputs(prev => {
                    const next = {...prev};
                    delete next[rewardObj.periodId];
                    return next;
                });
            };

            const handleDeleteReward = (id) => {
                const updated = rewards.filter(r => r.id !== id);
                setRewards(updated); robustSave(STORAGE_KEYS.REWARDS, STORAGE_KEYS.REWARDS + '_bak', updated);
            };

            const startEditReward = (reward) => { setEditingRewardId(reward.id); setEditRewardTitle(reward.title); };
            const saveEditReward = () => {
                if (!editRewardTitle.trim()) return;
                const updated = rewards.map(r => r.id === editingRewardId ? { ...r, title: editRewardTitle.trim() } : r);
                setRewards(updated); robustSave(STORAGE_KEYS.REWARDS, STORAGE_KEYS.REWARDS + '_bak', updated); setEditingRewardId(null);
            };

            const handleAIPhotoUpload = (e) => {
                // Mock behavior for testing AI logic
            };

            // 家長安全登入邏輯
            const handlePinLogin = (pin) => {
                if (pin === '9999') {
                    localStorage.setItem(STORAGE_KEYS.PARENT_PIN, '0000');
                    setIsParentAuth(true);
                    setLoginPin('');
                    setLoginError('');
                    alert("✅ 已使用緊急萬用碼登入！\n您的管理密碼已被重置為預設的「0000」。\n請至「系統安全設定」重新修改密碼。");
                    return;
                }
                const correctPin = localStorage.getItem(STORAGE_KEYS.PARENT_PIN) || '0000';
                if (pin === correctPin) {
                    setIsParentAuth(true);
                    setLoginPin('');
                    setLoginError('');
                } else {
                    setLoginError('密碼錯誤！');
                    setLoginPin('');
                    setTimeout(() => setLoginError(''), 1000);
                }
            };

            const bindBiometrics = async () => {
                if (!window.PublicKeyCredential) { alert("此裝置不支援生物辨識"); return; }
                try {
                    const challenge = new Uint8Array(32); window.crypto.getRandomValues(challenge);
                    const userID = new Uint8Array(16); window.crypto.getRandomValues(userID);
                    const cred = await navigator.credentials.create({
                        publicKey: {
                            challenge, rp: { name: "洋洋作息表" }, user: { id: userID, name: "Parent", displayName: "家長" },
                            pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
                            authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                            timeout: 60000
                        }
                    });
                    localStorage.setItem(STORAGE_KEYS.PARENT_BIO, btoa(String.fromCharCode.apply(null, new Uint8Array(cred.rawId))));
                    setHasBioBound(true);
                    alert("✅ 生物辨識綁定成功！");
                } catch (e) { alert("綁定失敗或被取消"); }
            };

            const loginWithBiometrics = async () => {
                const base64Id = localStorage.getItem(STORAGE_KEYS.PARENT_BIO);
                if (!base64Id) return;
                try {
                    const idStr = atob(base64Id);
                    const idArray = new Uint8Array(idStr.length);
                    for (let i=0; i<idStr.length; i++) idArray[i] = idStr.charCodeAt(i);
                    const challenge = new Uint8Array(32); window.crypto.getRandomValues(challenge);
                    
                    await navigator.credentials.get({
                        publicKey: { challenge, allowCredentials: [{ type: "public-key", id: idArray }], userVerification: "required" }
                    });
                    setIsParentAuth(true);
                    setLoginError('');
                } catch (e) { setLoginError('辨識失敗'); setTimeout(() => setLoginError(''), 1000); }
            };

            // 資料匯出與匯入
            const handleExportData = () => {
                const exportObj = {};
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith('yang_data_')) {
                        exportObj[key] = localStorage.getItem(key);
                    }
                }
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportObj));
                const dlAnchorElem = document.createElement('a');
                dlAnchorElem.setAttribute("href", dataStr);
                dlAnchorElem.setAttribute("download", `洋洋作息表備份_${getYYYYMMDD(realToday)}.json`);
                dlAnchorElem.click();
            };

            const handleImportData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        Object.keys(importedData).forEach(key => {
                            if (key.startsWith('yang_data_')) {
                                localStorage.setItem(key, importedData[key]);
                            }
                        });
                        alert('✅ 資料還原成功！系統將重新載入。');
                        window.location.reload();
                    } catch (err) {
                        alert('❌ 備份檔解析失敗，請確認檔案為正確的 JSON 格式。');
                    }
                };
                reader.readAsText(file);
            };

            const sortedRewardsHistory = useMemo(() => { return [...rewards].sort((a, b) => (b.sortKey || b.id).localeCompare(a.sortKey || a.id)); }, [rewards]);
            
            const activeExams = useMemo(() => { return exams.filter(e => e.dateStr === selectedExamDateStr); }, [exams, selectedExamDateStr]);
            
            const dynamicColor = useMemo(() => {
                if (currentTasks.length === 0 || completedCount === 0) return "#94a3b8"; 
                const ratio = completedCount / currentTasks.length;
                return `hsl(${Math.round(25 + (27 * ratio))}, ${Math.round(70 + (30 * ratio))}%, ${Math.round(45 + (12 * ratio))}%)`;
            }, [completedCount, currentTasks.length]);

            const greetingText = useMemo(() => {
                if (currentTasks.length === 0) return "今日放假！🏖️";
                if (progress === 0) return "洋洋，加油！";
                if (progress < 30) return "洋洋，好的開始！";
                if (progress < 70) return "洋洋，繼續保持！";
                if (progress < 100) return "洋洋，最後衝刺！";
                return "洋洋，太棒了！";
            }, [progress, currentTasks.length]);

            const kidExamRewards = useMemo(() => unclaimedRewards.filter(r => r.type === 'exam'), [unclaimedRewards]);

            const confettiElements = useMemo(() => {
                return [...Array(30)].map((_, i) => {
                    const colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
                    return <div key={i} className="absolute rounded-sm animate-confetti-fall" style={{ backgroundColor: colors[i % colors.length], left: `${Math.random() * 100}%`, width: `10px`, height: `8px`, animationDuration: `${Math.random() * 2 + 2}s`, animationDelay: `${Math.random() * 3}s`, opacity: Math.random() + 0.5 }} />;
                });
            }, []);

            // 繪製「成績圖表分析」
            const renderParentAnalysis = () => {
                const availableSubjects = Array.from(new Set(exams.map(e => e.subject)));
                const currentSubj = availableSubjects.includes(analysisSubject) ? analysisSubject : (availableSubjects[0] || '');

                const chartData = exams
                    .filter(e => e.subject === currentSubj)
                    .sort((a,b) => a.dateStr.localeCompare(b.dateStr) || a.id.localeCompare(b.id))
                    .map(e => ({
                        name: `${e.dateStr.substring(5)} ${e.unit || ''}`,
                        score: e.score,
                        unit: e.unit,
                        type: e.type,
                        fullDate: e.dateStr
                    }));

                const avgScore = chartData.length ? Math.round(chartData.reduce((acc, curr) => acc + curr.score, 0) / chartData.length) : 0;
                const maxScore = chartData.length ? Math.max(...chartData.map(d => d.score)) : 0;

                // 準備雷達圖資料 (各科平均)
                const radarData = examSubjects.map(subj => {
                    const subjExams = exams.filter(e => e.subject === subj);
                    const avg = subjExams.length ? Math.round(subjExams.reduce((a, c) => a + c.score, 0) / subjExams.length) : 0;
                    return { subject: subj, score: avg, fullMark: 100 };
                }).filter(d => d.score > 0);

                return (
                    <div className="max-w-4xl mx-auto space-y-6 animate-slide-down">
                        {radarData.length > 0 && window.Recharts && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col items-center">
                                     <h4 className="text-sm font-black text-slate-600 mb-2">各科平均雷達圖</h4>
                                     <div className="w-full h-[200px]">
                                         <ResponsiveContainer width="100%" height="100%">
                                             <RadarChart cx="50%" cy="50%" outerRadius="70%" data={radarData}>
                                                 <PolarGrid stroke="#e2e8f0" />
                                                 <PolarAngleAxis dataKey="subject" tick={{ fill: '#64748b', fontSize: 12, fontWeight: 'bold' }} />
                                                 <PolarRadiusAxis angle={30} domain={[0, 100]} tick={false} axisLine={false} />
                                                 <Radar name="平均分數" dataKey="score" stroke="#4f46e5" fill="#4f46e5" fillOpacity={0.4} />
                                                 <RechartsTooltip />
                                             </RadarChart>
                                         </ResponsiveContainer>
                                     </div>
                                </div>
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-center gap-4">
                                    <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100 text-center">
                                        <p className="text-xs font-black text-indigo-400 mb-1">【{currentSubj}】平均分數</p>
                                        <p className={`text-4xl font-black ${avgScore >= 90 ? 'text-emerald-600' : avgScore >= 80 ? 'text-indigo-600' : 'text-orange-500'}`}>{avgScore}</p>
                                    </div>
                                    <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100 text-center">
                                        <p className="text-xs font-black text-emerald-400 mb-1">【{currentSubj}】歷史最高分</p>
                                        <p className="text-4xl font-black text-emerald-600">{maxScore}</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                            <h3 className="font-black text-slate-700 flex items-center gap-2 mb-4 pb-2 border-b"><Icon name="ChartLine" className="w-5 h-5 text-indigo-500"/> 單科歷次成績走勢</h3>
                            
                            {availableSubjects.length > 0 ? (
                                <>
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar mb-6 pb-2">
                                        {availableSubjects.map(subj => (
                                            <button key={subj} onClick={() => setAnalysisSubject(subj)}
                                                className={`px-4 py-2 rounded-xl text-sm font-black transition-all shrink-0 ${currentSubj === subj ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                                                {subj}
                                            </button>
                                        ))}
                                    </div>

                                    {window.Recharts && chartData.length > 0 ? (
                                        <div className="w-full h-[300px] mt-4">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <LineChart data={chartData} margin={{ top: 20, right: 30, left: 0, bottom: 10 }}>
                                                    <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" vertical={false} />
                                                    <XAxis dataKey="name" tick={{ fontSize: 10, fill: '#64748b', fontWeight: 'bold' }} axisLine={false} tickLine={false} dy={10} />
                                                    <YAxis domain={[0, 100]} tick={{ fontSize: 12, fill: '#64748b', fontWeight: 'bold' }} axisLine={false} tickLine={false} dx={-10} />
                                                    <RechartsTooltip 
                                                        contentStyle={{ borderRadius: '1rem', border: 'none', boxShadow: '0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1)', fontWeight: 'bold' }}
                                                        itemStyle={{ color: '#4f46e5', fontSize: '16px' }}
                                                        labelStyle={{ color: '#64748b', marginBottom: '4px' }}
                                                        formatter={(value) => [`${value} 分`, '成績']}
                                                    />
                                                    <ReferenceLine y={90} stroke="#10b981" strokeDasharray="3 3" label={{ position: 'top', value: '獎勵達標線 90', fill: '#10b981', fontSize: 10, fontWeight: 'bold' }} />
                                                    <Line type="monotone" dataKey="score" stroke="#4f46e5" strokeWidth={4} dot={{ r: 4, strokeWidth: 2, fill: '#fff', stroke: '#4f46e5' }} activeDot={{ r: 6, fill: '#4f46e5', stroke: '#fff', strokeWidth: 2 }} />
                                                </LineChart>
                                            </ResponsiveContainer>
                                        </div>
                                    ) : (
                                        <div className="h-[200px] flex items-center justify-center text-slate-400 font-bold bg-slate-50 rounded-xl border border-dashed border-slate-200">
                                            {window.Recharts ? '該科目尚無足夠資料產生圖表' : '圖表模組載入中...'}
                                        </div>
                                    )}
                                </>
                            ) : (
                                <div className="text-center py-10 text-slate-400 font-bold bg-slate-50 rounded-xl border border-dashed border-slate-200">
                                    尚無任何考試紀錄，無法進行分析
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            return (
                <div className="app-container h-[100dvh] w-screen overflow-hidden bg-slate-200 flex justify-center" onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
                    
                    <input type="file" accept="image/*" ref={photoInputRef} className="hidden" onChange={handleAIPhotoUpload} />

                    {/* 行事曆事件新增彈窗 */}
                    {showEventModal && (
                        <div className="fixed inset-0 z-[300] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4" onClick={() => setShowEventModal(false)}>
                            <div className="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-2xl animate-slide-down" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-black text-slate-800 flex items-center gap-2"><Icon name="Calendar" className="w-5 h-5 text-indigo-500" /> 行事曆記錄</h3>
                                    <button onClick={() => setShowEventModal(false)} className="text-slate-400 hover:text-slate-600 bg-slate-100 rounded-full w-8 h-8 flex items-center justify-center"><Icon name="X" className="w-5 h-5"/></button>
                                </div>
                                <p className="text-slate-500 font-bold mb-4 text-center">{selectedEventDate}</p>
                                
                                {mode === 'parent' && (
                                    <button onClick={() => photoInputRef.current.click()} disabled={isAnalyzingPhoto} className="w-full mb-6 bg-indigo-50 text-indigo-600 border border-indigo-200 py-3 rounded-xl font-bold text-sm hover:bg-indigo-100 transition-colors flex justify-center items-center gap-2">
                                        {isAnalyzingPhoto ? <Icon name="Loader" className="animate-spin w-5 h-5" /> : <Icon name="Camera" className="w-5 h-5" />}
                                        {isAnalyzingPhoto ? 'AI 辨識中...' : '📸 AI 拍照/截圖自動填寫'}
                                    </button>
                                )}
                                
                                <div className="space-y-4 mb-6">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-500 mb-2">事件類型</label>
                                        <div className="grid grid-cols-2 gap-2">
                                            {Object.entries(EVENT_TYPES).map(([key, info]) => (
                                                <button key={key} onClick={() => setNewEventType(key)} 
                                                    className={`py-2 rounded-xl font-bold border-2 transition-all ${newEventType === key ? info.color + ' ring-2 ring-offset-1 ring-opacity-50' : 'bg-slate-50 text-slate-500 border-transparent hover:bg-slate-100'}`}>
                                                    {info.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-500 mb-2">事件內容</label>
                                        <input type="text" value={newEventTitle} onChange={e=>setNewEventTitle(e.target.value)} onKeyDown={(e) => {if(e.key === 'Enter'){ const newEvt = { id: Date.now().toString(), dateStr: selectedEventDate, type: newEventType, title: newEventTitle.trim() }; const updated = [...events, newEvt]; setEvents(updated); robustSave(STORAGE_KEYS.EVENTS, STORAGE_KEYS.EVENTS + '_bak', updated); setNewEventTitle(''); playSound('check');}}} placeholder="輸入事項..." className="w-full bg-slate-50 border-2 border-slate-200 rounded-xl px-4 py-3 font-bold outline-none focus:border-indigo-400 focus:bg-white transition-colors" />
                                    </div>

                                                        <div key={task.id} data-id={task.id} className="task-item bg-white border border-slate-200 p-3 md:p-4 rounded-xl shadow-sm flex flex-col relative overflow-hidden group">

                                                                <div className="absolute inset-0 bg-red-600/95 z-20 flex flex-col md:flex-row items-center justify-center p-4 text-white gap-4">
