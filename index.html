                                                                    <div className="flex gap-2">
                                                                        <button onClick={() => confirmRemoveTask(task.id)} className="bg-white text-red-600 px-4 py-2 rounded-lg font-black shadow-md">刪除</button>
                                                                        <button onClick={() => setDeleteConfirmId(null)} className="bg-red-800 text-white px-4 py-2 rounded-lg font-black border border-red-400">取消</button>
                                                                    </div>
                                                                </div>
                                                            )}
                                                            <div className="flex flex-col md:flex-row md:items-center gap-2 md:gap-4">
                                                                <div className="flex items-center gap-2 flex-1">
                                                                    <div className="w-8 h-8 rounded shrink-0 bg-slate-100 flex items-center justify-center drag-handle touch-none cursor-grab text-slate-400 hover:text-indigo-600 hover:bg-indigo-50">
                                                                        <Icon name="GripVertical" className="w-5 h-5 pointer-events-none" />
                                                                    </div>
                                                                    <input value={task.title} onChange={(e) => updateTask(task.id, 'title', e.target.value)} className="flex-1 text-base md:text-lg font-bold bg-transparent border border-slate-100 hover:border-slate-300 focus:border-indigo-400 focus:bg-slate-50 rounded px-3 py-1.5 outline-none transition-all placeholder:text-slate-300" placeholder="輸入作息名稱" />
                                                                </div>
                                                                <div className="flex items-center justify-between md:justify-end gap-3 pl-10 md:pl-0">
                                                                    <div className="flex gap-1">
                                                                        {baseDays.map(d => (
                                                                            <button key={d.id} onClick={() => toggleTaskRule(task.id, d.id)} className={`w-7 h-7 md:w-8 md:h-8 rounded text-[10px] md:text-xs font-black transition-all ${task.rule.includes(d.id) ? 'bg-indigo-600 text-white shadow-sm' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>{d.label}</button>
                                                                        ))}
                                                                    </div>
                                                                    <button onClick={() => setDeleteConfirmId(task.id)} className="p-1.5 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded shrink-0 transition-all md:opacity-0 group-hover:opacity-100">
                                                                        <Icon name="Trash2" className="w-5 h-5" />
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {/* 分頁 3：行事曆管理 */}
                                        {parentTab === 'calendar' && (
                                            <div className="max-w-3xl mx-auto space-y-4">
                                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                                    <div className="bg-emerald-50 px-4 py-3 border-b border-emerald-100 flex justify-between items-center">
                                                        <h3 className="font-black flex items-center gap-2 text-emerald-700"><Icon name="Calendar" className="w-5 h-5"/>家庭行事曆</h3>
                                                        <div className="flex items-center gap-3 bg-white px-2 py-1 rounded-lg border shadow-sm border-emerald-100">
                                                            <button onClick={() => setParentMonthOffset(p => p - 1)} className="p-1 rounded text-emerald-600 hover:bg-emerald-50"><Icon name="ChevronLeft" className="w-5 h-5"/></button>
                                                            <span className="font-bold text-sm w-20 text-center text-slate-700">{parentCalendarData.year} / {String(parentCalendarData.month).padStart(2, '0')}</span>
                                                            <button onClick={() => setParentMonthOffset(p => p + 1)} className="p-1 rounded text-emerald-600 hover:bg-emerald-50"><Icon name="ChevronRight" className="w-5 h-5"/></button>
                                                        </div>
                                                    </div>
                                                    <div className="p-2 md:p-4">
                                                        <div className="grid grid-cols-7 gap-1 text-center mb-2">
                                                            {['一','二','三','四','五','六','日'].map(d => <div key={d} className="text-xs font-bold text-slate-400">{d}</div>)}
                                                        </div>
                                                        <div className="grid grid-cols-7 gap-1 md:gap-2">
                                                            {parentCalendarData.data.map((day, idx) => (
                                                                day ? (
                                                                    <div key={day.dateStr}
                                                                         onClick={() => { setSelectedEventDate(day.dateStr); setShowEventModal(true); }}
                                                                         className={`aspect-[4/3] flex flex-col items-center justify-start py-1 rounded-xl border relative transition-all cursor-pointer hover:shadow-md 
                                                                         bg-slate-50 hover:bg-emerald-50 hover:border-emerald-200 overflow-hidden
                                                                         ${day.dateStr === getYYYYMMDD(realToday) ? 'bg-yellow-50 border-yellow-400 border-2 shadow-sm' : 'border-slate-100'}`}>
                                                                        <span className={`text-xs md:text-sm font-black ${day.dateStr === getYYYYMMDD(realToday) ? 'text-yellow-700' : 'text-slate-600'}`}>{day.date}</span>
                                                                        {day.events && day.events.length > 0 && (
                                                                            <div className="flex flex-col gap-0.5 mt-1 w-full px-0.5 md:px-1">
                                                                                {day.events.slice(0, 2).map((e, i) => (
                                                                                    <div key={i} className={`text-[8px] md:text-[10px] leading-tight truncate w-full px-1 py-0.5 rounded shadow-sm font-bold ${EVENT_TYPES[e.type].color}`}>
                                                                                        {EVENT_TYPES[e.type].label}: {e.title}
                                                                                    </div>
                                                                                ))}
                                                                                {day.events.length > 2 && <div className="text-[8px] text-slate-400 font-bold">+{day.events.length - 2}</div>}
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                ) : <div key={`pad-${idx}`} className="aspect-[4/3]" />
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="w-full bg-white rounded-2xl shadow-sm border border-slate-200 p-4 mt-4">
                                                    <div className="flex justify-between items-center mb-3">
                                                        <h4 className="text-sm font-black text-slate-500 flex items-center gap-2"><Icon name="ListTodo" className="w-4 h-4"/> 當月事件清單</h4>
                                                        <button onClick={() => { setSelectedEventDate(getYYYYMMDD(realToday)); setShowEventModal(true); }} className="text-xs bg-indigo-100 text-indigo-600 px-2 py-1 rounded font-bold hover:bg-indigo-200">
                                                            + 新增
                                                        </button>
                                                    </div>
                                                    <div className="space-y-2">
                                                        {parentCalendarData.data.filter(d => d && d.events.length > 0).map(d => d.events).flat().length > 0 ? (
                                                            parentCalendarData.data.filter(d => d && d.events.length > 0).map(d => d.events).flat().sort((a,b) => a.dateStr.localeCompare(b.dateStr)).map(e => (
                                                                <div key={e.id} className={`flex items-center gap-3 p-3 rounded-xl border ${EVENT_TYPES[e.type].color}`}>
                                                                    <span className="text-xs font-black px-2 py-1 rounded bg-white/70 shadow-sm shrink-0">{e.dateStr.substring(5)}</span>
                                                                    <span className="text-xs font-black px-2 py-1 rounded bg-white/70 shadow-sm shrink-0">{EVENT_TYPES[e.type].label}</span>
                                                                    <span className="font-bold text-sm flex-1">{e.title}</span>
                                                                    <button onClick={() => { const updated = events.filter(ev => ev.id !== e.id); setEvents(updated); robustSave(STORAGE_KEYS.EVENTS, STORAGE_KEYS.EVENTS + '_bak', updated); playSound('uncheck'); }} className="p-1.5 hover:bg-white/50 rounded-lg shrink-0"><Icon name="Trash2" className="w-4 h-4" /></button>
                                                                </div>
                                                            ))
                                                        ) : (
                                                            <div className="text-center text-slate-400 font-bold py-4 text-sm bg-slate-50 rounded-xl border border-dashed border-slate-200">本月無事件</div>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {/* 分頁 4：考試設定/紀錄 */}
                                        {parentTab === 'exams' && (
                                            <div className="max-w-4xl mx-auto space-y-6">
                                                
                                                <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                                                    <h3 className="font-black text-slate-700 flex items-center gap-2 mb-4 border-b pb-2"><Icon name="Settings2" className="w-5 h-5"/>考試科目與種類設定</h3>
                                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                        <div>
                                                            <label className="block text-sm font-bold text-slate-500 mb-2">考試種類</label>
                                                            <div className="flex gap-2 mb-2">
                                                                <input value={newTypeInput} onChange={e=>setNewTypeInput(e.target.value)} onKeyDown={e=>e.key==='Enter' && handleAddType()} placeholder="新增種類" className="flex-1 text-sm border rounded-lg px-3 py-1.5 outline-none focus:border-indigo-400 font-bold" />
                                                                <button onClick={handleAddType} className="bg-indigo-100 text-indigo-600 px-3 py-1.5 rounded-lg font-bold text-sm hover:bg-indigo-200">新增</button>
                                                            </div>
                                                            <div className="flex flex-wrap gap-2">
                                                                {examTypes.map(t => (
                                                                    <div key={t} className="bg-slate-100 text-slate-600 px-2 py-1 rounded text-xs font-bold flex items-center gap-1">
                                                                        {t} <button onClick={() => handleDeleteType(t)} className="text-slate-400 hover:text-red-500"><Icon name="X" className="w-3 h-3"/></button>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <label className="block text-sm font-bold text-slate-500 mb-2">考試科目</label>
                                                            <div className="flex gap-2 mb-2">
                                                                <input value={newSubjectInput} onChange={e=>setNewSubjectInput(e.target.value)} onKeyDown={e=>e.key==='Enter' && handleAddSubject()} placeholder="新增科目" className="flex-1 text-sm border rounded-lg px-3 py-1.5 outline-none focus:border-indigo-400 font-bold" />
                                                                <button onClick={handleAddSubject} className="bg-indigo-100 text-indigo-600 px-3 py-1.5 rounded-lg font-bold text-sm hover:bg-indigo-200">新增</button>
                                                            </div>
                                                            <div className="flex flex-wrap gap-2">
                                                                {examSubjects.map(s => (
                                                                    <div key={s} className="bg-yellow-50 text-yellow-700 border border-yellow-200 px-2 py-1 rounded text-xs font-bold flex items-center gap-1">
                                                                        {s} <button onClick={() => handleDeleteSubject(s)} className="text-yellow-400 hover:text-red-500"><Icon name="X" className="w-3 h-3"/></button>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <label className="block text-sm font-bold text-slate-500 mb-2">考試單元/範圍</label>
                                                            <div className="flex gap-2 mb-2">
                                                                <input value={newUnitInput} onChange={e=>setNewUnitInput(e.target.value)} onKeyDown={e=>e.key==='Enter' && handleAddUnit()} placeholder="新增單位(如:章)" className="flex-1 text-sm border rounded-lg px-3 py-1.5 outline-none focus:border-indigo-400 font-bold" />
                                                                <button onClick={handleAddUnit} className="bg-indigo-100 text-indigo-600 px-3 py-1.5 rounded-lg font-bold text-sm hover:bg-indigo-200">新增</button>
                                                            </div>
                                                            <div className="flex flex-wrap gap-2">
                                                                {examUnits.map(u => (
                                                                    <div key={u} className="bg-emerald-50 text-emerald-700 border border-emerald-200 px-2 py-1 rounded text-xs font-bold flex items-center gap-1">
                                                                        {u} <button onClick={() => handleDeleteUnit(u)} className="text-emerald-400 hover:text-red-500"><Icon name="X" className="w-3 h-3"/></button>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="bg-indigo-50 p-5 rounded-2xl border border-indigo-100 shadow-sm">
                                                    <h3 className="font-black text-indigo-900 flex items-center gap-2 mb-4 border-b border-indigo-200 pb-2"><Icon name="Gift" className="w-5 h-5"/>考試自動獎勵規則</h3>
                                                    <div className="flex flex-wrap gap-2 mb-4 items-end">
                                                        <div>
                                                            <label className="text-xs font-bold text-indigo-400 block mb-1">種類</label>
                                                            <select value={newRuleType} onChange={e=>setNewRuleType(e.target.value)} className="block w-24 p-2 rounded-lg border outline-none font-bold text-sm bg-white">
                                                                <option value="不限">不限</option>{examTypes.map(t=><option key={t} value={t}>{t}</option>)}
                                                            </select>
                                                        </div>
                                                        <div>
                                                            <label className="text-xs font-bold text-indigo-400 block mb-1">科目</label>
                                                            <select value={newRuleSubject} onChange={e=>setNewRuleSubject(e.target.value)} className="block w-24 p-2 rounded-lg border outline-none font-bold text-sm bg-white">
                                                                <option value="不限">不限</option>{examSubjects.map(s=><option key={s} value={s}>{s}</option>)}
                                                            </select>
                                                        </div>
                                                        <div>
                                                            <label className="text-xs font-bold text-indigo-400 block mb-1">達標分數</label>
                                                            <input type="number" value={newRuleScore} onChange={e=>setNewRuleScore(e.target.value)} placeholder="如:90" className="block w-20 p-2 rounded-lg border outline-none font-bold text-sm bg-white" />
                                                        </div>
                                                        <div>
                                                            <label className="text-xs font-bold text-indigo-400 block mb-1">累積次數</label>
                                                            <input type="number" value={newRuleCount} onChange={e=>setNewRuleCount(e.target.value)} placeholder="如:2" className="block w-20 p-2 rounded-lg border outline-none font-bold text-sm bg-white" />
                                                        </div>
                                                        <div className="flex-1 min-w-[150px]">
                                                            <label className="text-xs font-bold text-indigo-400 block mb-1">可兌換獎勵名稱 (作為預設值)</label>
                                                            <input type="text" value={newRuleRewardName} onChange={e=>setNewRuleRewardName(e.target.value)} placeholder="如: 樂高玩具" className="block w-full p-2 rounded-lg border outline-none font-bold text-sm bg-white" />
                                                        </div>
                                                        <button onClick={() => {
                                                            if(!newRuleScore || !newRuleCount) return;
                                                            const newRule = { id: Date.now().toString(), type: newRuleType, subject: newRuleSubject, minScore: parseInt(newRuleScore), requiredCount: parseInt(newRuleCount), rewardName: newRuleRewardName || '考試獎勵' };
                                                            const updated = [...examRules, newRule];
                                                            setExamRules(updated); robustSave(STORAGE_KEYS.EXAM_RULES, STORAGE_KEYS.EXAM_RULES+'_bak', updated);
                                                            setNewRuleScore(''); setNewRuleCount(''); setNewRuleRewardName('');
                                                        }} className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-indigo-700">新增規則</button>
                                                    </div>
                                                    <div className="space-y-2">
                                                        {examRules.map(r => (
                                                            <div key={r.id} className="bg-white p-3 rounded-lg border flex justify-between items-center text-sm font-bold shadow-sm">
                                                                <span className="text-slate-600"><span className="text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded mr-1">{r.type === '不限' ? '任何考試' : r.type}</span> <span className="text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded mr-1">{r.subject === '不限' ? '任何科目' : r.subject}</span> 達 <span className="text-red-500">{r.minScore}</span> 分，累積滿 <span className="text-red-500">{r.requiredCount}</span> 次 ➔ 預設獎品：<span className="text-indigo-600">{r.rewardName}</span></span>
                                                                <button onClick={() => { const updated = examRules.filter(er => er.id !== r.id); setExamRules(updated); robustSave(STORAGE_KEYS.EXAM_RULES, STORAGE_KEYS.EXAM_RULES+'_bak', updated); }} className="text-slate-400 hover:text-red-500"><Icon name="Trash2" className="w-4 h-4"/></button>
                                                            </div>
                                                        ))}
                                                        {examRules.length === 0 && <div className="text-sm font-bold text-indigo-300">尚未設定任何考試獎勵規則。</div>}
                                                    </div>
                                                </div>

                                                <div className="space-y-4">
                                                    <h3 className="font-black text-slate-700 flex items-center gap-2 mb-2 border-b pb-2"><Icon name="ListTodo" className="w-5 h-5"/>歷史考試成績總覽</h3>
                                                    {exams.length > 0 ? (
                                                        exams.sort((a,b) => b.dateStr.localeCompare(a.dateStr) || b.id.localeCompare(a.id)).map(e => {
                                                            const isEditing = editingExamId === e.id;
                                                            return (
                                                                <div key={e.id} className="bg-white border border-slate-200 p-4 md:p-5 rounded-xl shadow-sm hover:border-yellow-300 transition-colors group">
                                                                    {isEditing ? (
                                                                        <div className="flex flex-wrap gap-2 items-center bg-yellow-50 p-3 rounded-lg">
                                                                            <input type="date" value={editExamDate} onChange={ev=>setEditExamDate(ev.target.value)} className="p-1.5 rounded border text-sm font-bold" />
                                                                            <select value={editExamType} onChange={ev=>setEditExamType(ev.target.value)} className="p-1.5 rounded border text-sm font-bold"><option value="">種類</option>{examTypes.map(t=><option key={t} value={t}>{t}</option>)}</select>
                                                                            <select value={editExamSubject} onChange={ev=>setEditExamSubject(ev.target.value)} className="p-1.5 rounded border text-sm font-bold"><option value="">科目</option>{examSubjects.map(s=><option key={s} value={s}>{s}</option>)}</select>
                                                                            <input type="text" value={editExamUnit} onChange={ev=>setEditExamUnit(ev.target.value)} placeholder="單元/範圍" className="p-1.5 w-24 rounded border text-sm font-bold" />
                                                                            <input type="number" value={editExamScore} onChange={ev=>setEditExamScore(ev.target.value)} className="p-1.5 w-16 rounded border text-sm font-bold text-center" />
                                                                            <button onClick={() => {
                                                                                let scoreNum = parseInt(editExamScore, 10); if(isNaN(scoreNum)) scoreNum=0;
                                                                                const updated = exams.map(ex => ex.id === e.id ? {...ex, dateStr: editExamDate, type: editExamType, subject: editExamSubject, unit: editExamUnit, score: scoreNum} : ex);
                                                                                setExams(updated); robustSave(STORAGE_KEYS.EXAMS, STORAGE_KEYS.EXAMS+'_bak', updated); setEditingExamId(null);
                                                                            }} className="bg-indigo-500 text-white px-3 py-1.5 rounded text-sm font-bold ml-auto">儲存</button>
                                                                            <button onClick={() => setEditingExamId(null)} className="bg-slate-200 text-slate-600 px-3 py-1.5 rounded text-sm font-bold">取消</button>
                                                                        </div>
                                                                    ) : (
                                                                        <div className="flex items-center justify-between">
                                                                            <div className="flex items-center gap-4">
                                                                                <div className={`w-12 h-12 rounded-full flex items-center justify-center border-2 shrink-0 ${e.score >= 90 ? 'bg-red-50 border-red-200 text-red-500' : 'bg-yellow-50 border-yellow-200 text-yellow-600'}`}>
                                                                                    <Icon name="Award" className="w-6 h-6" />
                                                                                </div>
                                                                                <div>
                                                                                    <div className="flex items-center gap-2 mb-1">
                                                                                        <span className="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded font-bold">{e.type}</span>
                                                                                        {e.unit && <span className="text-[10px] bg-indigo-50 text-indigo-500 border border-indigo-100 px-2 py-0.5 rounded font-bold">{e.unit}</span>}
                                                                                    </div>
                                                                                    <p className="font-black text-slate-800 text-lg flex items-baseline gap-2">
                                                                                        {e.subject} <span className={`text-2xl ${e.score >= 90 ? 'text-red-500' : 'text-yellow-600'}`}>{e.score}分</span>
                                                                                    </p>
                                                                                    <p className="text-xs text-slate-400 font-bold flex items-center gap-1 mt-1"><Icon name="Calendar" className="w-3 h-3"/> 考試日期：{e.dateStr}</p>
                                                                                </div>
                                                                            </div>
                                                                            <div className="flex gap-1">
                                                                                <button onClick={() => {setEditingExamId(e.id); setEditExamDate(e.dateStr); setEditExamType(e.type); setEditExamSubject(e.subject); setEditExamUnit(e.unit || ''); setEditExamScore(e.score);}} className="p-2 text-slate-300 hover:text-indigo-500 hover:bg-indigo-50 rounded-lg transition-all opacity-100 md:opacity-0 group-hover:opacity-100"><Icon name="Edit2" className="w-5 h-5" /></button>
                                                                                <button onClick={() => handleDeleteExam(e.id)} className="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all opacity-100 md:opacity-0 group-hover:opacity-100"><Icon name="Trash2" className="w-5 h-5" /></button>
                                                                            </div>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            );
                                                        })
                                                    ) : (
                                                        <div className="text-center py-12 text-slate-400 font-bold border-2 border-dashed border-slate-200 rounded-2xl bg-white shadow-sm">
                                                            <Icon name="Award" className="w-12 h-12 mx-auto mb-3 opacity-30 text-yellow-500" /> 目前還沒有任何考試紀錄喔！
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )}

                                        {/* 分頁 5：成績圖表分析 */}
                                        {parentTab === 'analysis' && renderParentAnalysis()}

                                        {/* 分頁 6：獎勵設定/紀錄 */}
                                        {parentTab === 'rewards' && (
                                            <div className="max-w-3xl mx-auto space-y-6">
                                                
                                                <div className="bg-gradient-to-br from-indigo-50 to-blue-50 p-5 md:p-6 rounded-2xl border border-indigo-100 shadow-sm relative overflow-hidden">
                                                    <div className="absolute top-0 right-0 p-4 opacity-10 pointer-events-none"><Icon name="Trophy" className="w-24 h-24 text-indigo-900" /></div>
                                                    <h3 className="font-black text-indigo-900 mb-4 flex items-center gap-2 relative z-10"><Icon name="Star" className="w-5 h-5 text-indigo-500"/> 本期任務達標進度</h3>
                                                    
                                                    <div className="flex flex-col gap-4 relative z-10">
                                                        <div className="bg-white/80 backdrop-blur-sm p-4 rounded-xl shadow-sm border border-slate-100">
                                                            <div className="flex justify-between items-end mb-2">
                                                                <p className="font-bold text-slate-700 flex items-center gap-2"><Icon name="Calendar" className="w-4 h-4 text-emerald-500"/> 本週作息 (週一至週日)</p>
                                                                <p className="text-sm font-black text-emerald-600">{currentWeekProgress} / 7 天</p>
                                                            </div>
                                                            <div className="w-full bg-slate-200 rounded-full h-3 mb-1 overflow-hidden">
                                                                <div className="bg-emerald-400 h-full rounded-full transition-all duration-1000" style={{ width: `${Math.round((currentWeekProgress/7)*100)}%` }}></div>
                                                            </div>
                                                        </div>
                                                        <div className="bg-white/80 backdrop-blur-sm p-4 rounded-xl shadow-sm border border-slate-100">
                                                            <div className="flex justify-between items-end mb-2">
                                                                <p className="font-bold text-slate-700 flex items-center gap-2"><Icon name="Crown" className="w-4 h-4 text-orange-500"/> 本月作息 (1號至月底)</p>
                                                                <p className="text-sm font-black text-orange-500">{currentMonthProgress.count} / {currentMonthProgress.total} 天</p>
                                                            </div>
                                                            <div className="w-full bg-slate-200 rounded-full h-3 mb-1 overflow-hidden">
                                                                <div className="bg-orange-400 h-full rounded-full transition-all duration-1000" style={{ width: `${Math.round((currentMonthProgress.count/currentMonthProgress.total)*100)}%` }}></div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div>
                                                    <h3 className="font-black text-slate-700 border-b border-slate-200 pb-2 mb-3">💎 可兌換的獎勵清單</h3>
                                                    {unclaimedRewards.length > 0 ? (
                                                        <div className="space-y-3">
                                                            {unclaimedRewards.map(reward => (
                                                                <div key={reward.periodId} className={`p-4 rounded-xl border flex flex-col gap-3 shadow-sm ${reward.type === 'monthly' ? 'bg-orange-50 border-orange-200' : reward.type === 'exam' ? 'bg-indigo-50 border-indigo-200' : 'bg-emerald-50 border-emerald-200'}`}>
                                                                    <div className="flex justify-between items-center">
                                                                        <span className={`font-black flex items-center gap-1 ${reward.type === 'monthly' ? 'text-orange-800' : reward.type === 'exam' ? 'text-indigo-800' : 'text-emerald-800'}`}>
                                                                            <Icon name={reward.type === 'monthly' ? 'Crown' : reward.type === 'exam' ? 'Award' : 'Gift'} className="w-4 h-4" />
                                                                            {reward.label}
                                                                            {reward.count > 1 && <span className="ml-2 text-red-500 bg-red-100 px-2 py-0.5 rounded text-xs font-black">可兌換 {reward.count} 次</span>}
                                                                        </span>
                                                                    </div>
                                                                    <div className="flex flex-col md:flex-row gap-2">
                                                                        <input 
                                                                            type="text" 
                                                                            placeholder="輸入發放的獎品 (例: 買玩具、看電視)" 
                                                                            value={pendingRewardsInputs[reward.periodId] !== undefined ? pendingRewardsInputs[reward.periodId] : (reward.defaultRewardName || '')}
                                                                            onChange={(e) => setPendingRewardsInputs(prev => ({...prev, [reward.periodId]: e.target.value}))}
                                                                            onKeyDown={(e) => e.key === 'Enter' && handleClaimReward(reward)}
                                                                            className="flex-1 px-3 py-2 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-indigo-300 font-bold"
                                                                        />
                                                                        <button onClick={() => handleClaimReward(reward)} className={`text-white px-4 py-2 rounded-lg font-black shadow-sm shrink-0 ${reward.type === 'monthly' ? 'bg-orange-500 hover:bg-orange-600' : reward.type === 'exam' ? 'bg-indigo-500 hover:bg-indigo-600' : 'bg-emerald-500 hover:bg-emerald-600'}`}>記錄已兌換</button>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    ) : (
                                                        <div className="bg-slate-50 border border-slate-200 rounded-xl p-6 text-center text-slate-400 font-bold shadow-sm">
                                                            目前沒有可兌換的獎勵，繼續保持努力！
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="space-y-3 pt-2">
                                                    <h3 className="font-black text-slate-700 border-b border-slate-200 pb-2 mb-4">歷史獎勵兌換紀錄</h3>
                                                    {sortedRewardsHistory.length > 0 ? (
                                                        sortedRewardsHistory.map((reward) => {
                                                            const isValid = isPeriodFullyCompleted(reward.periodId);
                                                            const isEditing = editingRewardId === reward.id;

                                                            return (
                                                                <div key={reward.id} className={`flex items-center justify-between bg-white border-2 p-4 rounded-xl shadow-sm transition-shadow group ${!isValid ? 'border-red-300 bg-red-50/50' : 'border-slate-200 hover:border-indigo-200'}`}>
                                                                    <div className="flex flex-col flex-1 gap-2 overflow-hidden">
                                                                        <div className="flex items-center gap-4 w-full">
                                                                            <div className={`w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center shrink-0 shadow-inner border-2 ${!isValid ? 'bg-red-50 text-red-500 border-red-100' : reward.type === 'monthly' ? 'bg-orange-50 text-orange-500 border-orange-100' : reward.type === 'exam' ? 'bg-indigo-50 text-indigo-500 border-indigo-100' : 'bg-emerald-50 text-emerald-500 border-emerald-100'}`}>
                                                                                {!isValid ? <Icon name="AlertTriangle" className="w-5 h-5 md:w-6 md:h-6" /> : <Icon name={reward.type === 'monthly' ? 'Crown' : reward.type === 'exam' ? 'Award' : 'Gift'} className="w-5 h-5 md:w-6 md:h-6" />}
                                                                            </div>
                                                                            <div className="flex-1 overflow-hidden">
                                                                                {isEditing ? (
                                                                                    <div className="flex items-center gap-2 mb-1">
                                                                                        <input 
                                                                                            type="text" 
                                                                                            value={editRewardTitle} 
                                                                                            onChange={e => setEditRewardTitle(e.target.value)} 
                                                                                            className="flex-1 px-2 py-1 border border-indigo-300 rounded outline-none focus:ring-2 focus:ring-indigo-400 font-bold text-slate-800 text-sm md:text-base"
                                                                                            autoFocus
                                                                                            onKeyDown={e => e.key === 'Enter' && saveEditReward()}
                                                                                        />
                                                                                        <button onClick={saveEditReward} className="bg-indigo-600 text-white px-3 py-1 rounded shadow-sm text-xs font-bold shrink-0">儲存</button>
                                                                                        <button onClick={() => setEditingRewardId(null)} className="bg-slate-200 text-slate-600 px-3 py-1 rounded text-xs font-bold shrink-0">取消</button>
                                                                                    </div>
                                                                                ) : (
                                                                                    <div className="flex flex-col md:flex-row md:items-center gap-1 md:gap-2 mb-0.5">
                                                                                        <p className={`font-black text-base md:text-lg leading-tight truncate ${!isValid ? 'text-red-700 line-through opacity-70' : 'text-slate-800'}`}>{reward.title}</p>
                                                                                        <span className={`text-[10px] px-2 py-0.5 rounded border font-bold inline-block w-max shrink-0 ${!isValid ? 'bg-red-100 text-red-600 border-red-200' : reward.type === 'monthly' ? 'bg-orange-100 text-orange-600 border-orange-200' : reward.type === 'exam' ? 'bg-indigo-100 text-indigo-600 border-indigo-200' : 'bg-emerald-100 text-emerald-600 border-emerald-200'}`}>
                                                                                            {reward.periodLabel}
                                                                                        </span>
                                                                                    </div>
                                                                                )}
                                                                                {!isEditing && <p className="text-xs text-slate-400 font-bold flex items-center gap-1 truncate"><Icon name="Calendar" className="w-3 h-3 shrink-0"/> 兌換日期：{reward.date}</p>}
                                                                                {!isValid && !isEditing && <p className="text-[10px] md:text-xs text-red-500 font-bold mt-1 animate-pulse flex items-center gap-1"><Icon name="AlertTriangle" className="w-3 h-3 shrink-0"/> 警告：該週期成績/紀錄已異動，達標失效！</p>}
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                    {!isEditing && (
                                                                        <div className="flex flex-col md:flex-row gap-1 shrink-0 ml-2">
                                                                            <button onClick={() => startEditReward(reward)} className="p-2 text-slate-300 hover:text-indigo-500 hover:bg-indigo-50 rounded-lg transition-all opacity-100 md:opacity-0 group-hover:opacity-100">
                                                                                <Icon name="Edit2" className="w-5 h-5" />
                                                                            </button>
                                                                            <button onClick={() => handleDeleteReward(reward.id)} className="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all opacity-100 md:opacity-0 group-hover:opacity-100">
                                                                                <Icon name="Trash2" className="w-5 h-5" />
                                                                            </button>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            );
                                                        })
                                                    ) : (
                                                        <div className="text-center py-10 text-slate-400 font-bold border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50/50">
                                                            <Icon name="Gift" className="w-10 h-10 mx-auto mb-2 opacity-30" />
                                                            目前還沒有任何歷史紀錄喔！
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )}

                                        {/* 分頁 7：系統設定 */}
                                        {parentTab === 'settings' && (
                                            <div className="max-w-4xl mx-auto space-y-6">
                                                <div className="bg-slate-800 rounded-2xl border border-slate-700 p-6 shadow-lg relative overflow-hidden">
                                                    <div className="absolute -right-10 -bottom-10 opacity-10"><Icon name="Settings2" className="w-40 h-40 text-white" /></div>
                                                    <h3 className="font-black text-white text-lg flex items-center gap-2 mb-4 relative z-10"><Icon name="Lock" className="w-5 h-5 text-indigo-400"/> 系統安全與資料備份</h3>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 relative z-10">
                                                        <div className="bg-slate-700/50 p-4 rounded-xl border border-slate-600">
                                                            <h4 className="text-sm font-bold text-indigo-300 mb-3">安全鎖定設定</h4>
                                                            <div className="flex items-center gap-2 mb-3">
                                                                <input type="password" value={settingOldPin} onChange={e=>setSettingOldPin(e.target.value.replace(/\D/g,'').slice(0,4))} placeholder="輸入舊密碼" className="flex-1 bg-slate-800 border border-slate-600 text-white font-bold rounded-lg px-3 py-2 outline-none focus:border-indigo-400 text-center tracking-widest" />
                                                                <input type="password" value={settingNewPin} onChange={e=>setSettingNewPin(e.target.value.replace(/\D/g,'').slice(0,4))} placeholder="設定 4 位新密碼" className="flex-1 bg-slate-800 border border-slate-600 text-white font-bold rounded-lg px-3 py-2 outline-none focus:border-indigo-400 text-center tracking-widest" />
                                                            </div>
                                                            <button onClick={() => {
                                                                const currentPin = localStorage.getItem(STORAGE_KEYS.PARENT_PIN) || '0000';
                                                                if(settingOldPin !== currentPin) return alert("❌ 舊密碼輸入錯誤！");
                                                                if(settingNewPin.length !== 4) return alert("❌ 新密碼必須為 4 位數字！");
                                                                localStorage.setItem(STORAGE_KEYS.PARENT_PIN, settingNewPin);
                                                                setSettingOldPin(''); setSettingNewPin('');
                                                                alert("✅ 密碼更新成功！下次請使用新密碼登入。");
                                                            }} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-2 rounded-lg font-bold text-sm transition-colors mb-3">確認修改密碼</button>
                                                            
                                                            <button onClick={bindBiometrics} className={`w-full py-2.5 rounded-lg font-bold text-sm flex items-center justify-center gap-2 transition-colors ${hasBioBound ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/50' : 'bg-slate-600 hover:bg-slate-500 text-white'}`}>
                                                                <Icon name="Fingerprint" className="w-4 h-4" /> {hasBioBound ? "生物辨識已綁定 (點擊重新綁定)" : "綁定平板生物辨識"}
                                                            </button>
                                                        </div>
                                                        <div className="bg-slate-700/50 p-4 rounded-xl border border-slate-600 flex flex-col justify-center">
                                                            <h4 className="text-sm font-bold text-indigo-300 mb-3">資料備份與還原 (離線檔案)</h4>
                                                            <div className="flex gap-2">
                                                                <button onClick={handleExportData} className="flex-1 py-3 bg-slate-600 hover:bg-slate-500 text-white rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-colors shadow-sm">
                                                                    <Icon name="Download" className="w-4 h-4" /> 匯出備份檔
                                                                </button>
                                                                <button onClick={() => fileInputRef.current.click()} className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-colors shadow-sm">
                                                                    <Icon name="Upload" className="w-4 h-4" /> 從檔案還原
                                                                </button>
                                                            </div>
                                                            <p className="text-[10px] text-slate-400 mt-4 leading-relaxed bg-slate-800 p-2 rounded-lg border border-slate-600/50">
                                                                <strong className="text-orange-400">強烈建議：</strong>每月定期匯出資料保存至電腦或雲端硬碟。若更換設備或清除瀏覽器紀錄，可隨時「從檔案還原」救回所有設定與作息紀錄。
                                                            </p>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
